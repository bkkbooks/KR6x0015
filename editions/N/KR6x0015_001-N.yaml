body:
  text: 長老偈經歸命彼世尊應供等正覺一山間嚴窟內聲如獅子吼長老練己偈自作以聽偈二順名順姓順法住有智諸眾人專念住不懈怠三成果思察此人人此彼處觀知不死道此義為宣說一偈集第一品一予葺一小舍無風心情好天若喜請降雨予心善住定與得此解脫予住於熱烈於天降下雨尊者須菩提長老述此偈二止息歸寂靜誦咒勿輕噪拂去邪惡法如風掃落葉尊者摩訶拘絺羅長老述此偈三見如來此慧猶點中夜火來者無疑惑如來與眼與光明尊者康迦麗瓦達長老述此偈四善良且賢明唯近見義人廣大深遠見而實甚困難微妙微細義精勤乃得知明眼之智者善達此智慧滿慈母之子尊者富樓那長老唱此偈五自調難調御彼人如陀驃滿足超疑惑陀驃勝利者寂滅無怖畏寂滅心安立尊者陀驃長老唱此偈六比丘善滿足心住於安定獨入寒林中身毛不豎立此身護念堅彼為勝利者尊者寒林住者三浮陀長老唱此偈七破除魔王軍如破弱葦堤除怖勝利者調御歸寂滅是故心安立尊者跋利迦長老唱此偈八難調而調御調御之雄士滿足超疑惑毘羅勝利者身毛不豎立心安歸寂滅右毘羅長老九分別諸法中我達最勝者善達無惡處亦無邪度量右畢蘭陀筏蹉長老一寂靜達吠陀彼此世自制皆捨諸欲望諸法無染著我知世起滅右芬那瑪薩長老攝頌須菩提拘絺羅長老自制康迦麗瓦達滿慈母之子富樓那陀驃寒林住者三浮陀跋利迦毘羅畢陀筏蹉拂黑闇之芬那瑪薩第二品一一聞佛說法喜比丘道寂靜諸行之止息而得安樂住右秋拉伽瓦迦長老一二具有智慧力以及諸戒行安定喜禪思正念要攝食已離欲貪者以待時之至右摩訶伽瓦迦長老一三碧雲似有色美冷湛清水赤色甲蟲掩吾樂此岩山右瓦那瓦奢長老一四吾師曰尸婆迦身雖村里住我心去森林雖疲我已去識者無執著右瓦那瓦奢長老之沙彌尸婆迦一五五分結具斷五下分結捨精進修五根超五著比丘稱渡瀑流人右軍達達那長老一六恰如善種生角冠牛挽犁前進少勞苦等同得安樂我捨離貪欲日夜少勞苦右貝拉陀席薩長老一七懶惰且多食安眠輾轉臥如糠飼大豕再再入母胎右馱索迦長老一八於恐怖林中佛嗣者比丘彼以骨相觀遍覆全大地予思彼精進彼疾捨貪欲右辛伽拉比陀長老一九渠工以導水箭工以矯箭木工以曲材德行人調己右拘羅長老二我無死恐怖無生命欲念正知有正念捨此積集身右阿逸多長老攝頌秋拉伽瓦迦摩訶伽瓦迦瓦那瓦奢者尸婆迦與軍達達那貝拉提駝索迦辛伽拉比提拘羅阿逸多以上十長老第三品二一恐怖我不怖師知不死法怖畏滅無跡比丘進其道右民拘律陀長者二二碧色有美頸孔雀著毛冠鳴於迦羅瓦此等涼風聲喚醒入眠者又我入定中呼我目清醒右奢達迦長老二三我於竹叢中飲食蜜乳麋思蘊之起滅遠離念增長向於峯二偈集右巨舍羅長老二四我出家已一夏終了見法美德通達三明得佛之果右須康達長老二五其心由光生常向於極果黑魔汝若傷比丘必逢其苦果右難提長老二六聞日種佛陀善說諸言教我證微妙法如箭射毛端右無畏長老二七突婆孤沙草普塔吉羅草與優尸羅根以及們叉草波羅婆草等我心專遠離由心離此草右路摩尚祇迦長老二八不專心求衣亦不喜裝飾戒德香送汝勿送他人處右閻浮村出生兒長老二九汝欲矯己直猶箭匠修箭哈利陀汝欲直汝心而須斷無明右哈利達長老三我身生病心正念身生病時勿放逸右鬱帝迦長老攝頌尼拘律陀奢達迦巨舍羅長老須康達難提無畏長老路摩尚祇迦閻浮村出身兒哈利達鬱帝迦仙等第四品三一森林大叢中蛇咬蚊螫噬如象臨戰場正念住其處右伽趺瓦拉提利耶長老三二以老換不老涅槃熱苦換清涼無上之寂靜換得安穩樂右須卑長老三三如母愛一兒人對諸生類於一切時地普遍應慈愛右蘇波迦長老三四對有智慧者不近婦為貴村里來森林由彼而入家依此波捨起不呼即去之右波捨長老三五欲求安樂者必定得安樂人達不死道履修八正支依此有名聲依此有清譽右薩曼尼迦尼長老三六聞善且行善常住無家善無物累沙門善趣最勝道右拘摩母之子難陀長老三七遊方不自制失定不得益不淨意巡國何作為然而制憍慢獨坐靜禪思右庫摩母之子難陀長老之同輩長老三八彼以神通力舍牢浮河停牛主之比丘無愛無動轉超越諸戀著抵達於彼岸諸天禮牟尼右牛主長老三九如以刀刃刺如以火燒頭為捨諸貪欲比丘正念遊右帝須長老四如以刀刃刺如以火燒頭為捨生有欲比丘正念遊右瓦達瑪那長老攝頌伽趺瓦拉提利耶須卑蘇波迦波捨薩曼尼迦尼尼拘摩母之子難陀難陀之同輩牛主帝須長老有大名稱瓦達瑪那第五品四一毘婆羅山岩槃荼婆山窟暴雷劈墮落然此無比者入窟而禪思右尸里瓦達長老四二奢羅烏婆奢羅席斯婆奢羅汝等正念住惡魔來汝處有如裂髮人右迦第羅林住者離曰長老四三善脫予善脫由三惡善脫不用鎌刈割免犁耕小鋤此物於此處不要或不然須曼迦羅汝應為禪思須曼迦羅汝應住精勤右須曼迦羅長老四四我母人為死或生不見而悲嘆母我生且見我何故母悲嘆右薩努長老四五恰如優生馬倒地再起立如是具正見正等覺弟子我等為佛之良種弟子右喇瑪尼耶威哈利長老四六信心予出家出家比丘身增長念與智我心住善定魔王隨意變形相予不為汝動右三彌提長老四七歸命佛大雄解脫一切處我住於尊教我住於無漏右優闍迦長老四八我為出家身出家而至今思惟無卑過我不知起過右刪闍耶長老四九西比伽鳥鳴嗶哈嗶哈響我心不為動心樂一境性右拉瑪奈雅迦長老五大地降雨注風吹電往來予息止疑念予心住善定右毘摩羅長老攝頌尸里瓦達離曰長老須曼伽羅薩努長老拉瑪尼亞威哈利三彌提與優闍迦刪闍耶瑪拉奈雅克戰彼毘摩羅第六品五一雨音如調律茨葺蓋屋舍心定樂防風雨欲降即降右瞿低迦長老五二雨音如調律茨葺蓋屋舍風防而快樂予心亦住定雨欲下即下右善肘長老五三雨音如調律茨葺蓋屋舍風防而快樂中棲予精勤雨欲降即降右瓦利耶長老五四雨音如調律茨葺蓋屋舍風防而快樂獨自其中棲雨欲降即降右鬱帝迦長老五五入安闍那林長牀為屋舍通達於三明成就佛之教右安闍那林住長老五六屋舍之中有何人屋舍之中有比丘正念善住心離欲知法友汝造屋舍非無益右屋舍住長老五七汝之屋謂舊茅屋汝願欲得新屋舍屋舍欲念應除去比丘欲求新屋乃為苦右屋舍住長老五八汝依信心施予屋予住屋舍喜又樂予無少女之要求婦女等汝等應赴所要處右可喜屋舍住長老五九予依信心而出家森林之間構屋舍修道精勤又熱烈住於正知與正念右拘薩羅住長老六予入屋舍有目的予欲成就予其願予求明智與解脫捨棄憍慢與隨眠右尸婆羅長老攝頌長老瞿低迦善肘瓦利耶鬱帝迦仙安闍那林住長老長老二人屋舍住可喜屋舍住長老拘薩羅與尸婆羅第七品六一見者見見者亦見未見者然而未見者兩者皆不見右婆破長老六二我等處林間被捨如木片能夠住森林多人羨欣我如墮地獄者欣羨昇天庭右跋耆子長老六三欲心墮死域又再生來世我今務已終以樂於所樂由樂得安樂右拔迦長老六四我由菴婆波利女之樹名生謂頻毘沙羅由標白旗者為父而生捨欲之智旗滅魔羅天旗右毘摩羅憍陳如長老六五郁啟巴迦達瓦奢住其多年蘊蓄所安坐修道大滿悅為其家主等說法右郁啟巴迦達瓦奢長老六六大雄已到達諸法之彼岸為我說教法我聞所說法而喜住其處通達於三明成就佛所教右彌喜長老六七燒滅諸煩惱一切生有除生死輪迴斷今不再受生右能聽一法長老六八增上不放逸學習寂默道如是常寂靜正念無憂悲右耶屈陀尼耶一優陀那長老六九一切勝智者以說大味法聞此為不滅而勤修道行彼通安穩道右車匿長老七此處戒第一智者為最上人界及天界戒智人勝利右富樓那長老攝頌婆破跋耆子拔迦毘摩羅憍陳如郁啟巴迦達瓦奢彌喜一法者一優陀那車匿大力量之富樓那第八品七一見極微妙義巧慧行謙遜善習事佛者如是之人者不難得涅槃右瓦奢婆羅長老七二恰如一幼樹頂茂枝葉生時難以除去娶妻亦如是彼今且許我我今得出家右阿睹瑪長老七三見老朽惱苦罹病而將死壽命至滅盡緣此去欲樂出家乃得度右摩那長老七四欲樂與瞋恚惛沈與睡眠掉舉與疑惑比丘總無此右須耶摩那長老七五善見修練人己斷諸疑惑而增大覺悟愚者即成賢右須薩羅陀長老七六高慢者中自卑卑怯者中自高住他人所不住樂者中不可樂右毘揚奢哈長老七七昔日心隨逐流離任樂所今日如實制手鉤制狂象右哈陀羅哈普陀長老七八未得轉向緣輪迴奔生死今得脫苦蘊諸苦皆盡失右棉達西羅長老七九我總棄貪欲瞋恚亦總絕愚癡總消失安靖得清涼右羅奇陀長老八我之所作業或小又或大一切總絕盡今我無再生右郁迦長老攝頌瓦奢婆羅長老阿睹瑪須耶摩那摩那仙須薩羅陀毘揚奢哈阿羅哈普陀棉達西羅羅奇陀郁迦長老第九品八一昔我往世所作惡今於此生感應果然我已無他生因不再感受他生果右薩美提具陀長老八二徒兒汝今乞食易而向於安穩無有怖畏行勿為悲憂累右迦葉長老八三師子晝夜善勿怠精勤而安住修習諸善法速棄合成身右師子長老八四夜則終夜眠晝則樂群處如此邪智徒何時斷盡苦右尼陀長老八五熟通住心念知遠離妙味正念有智慧以此詳思惟非享俗安樂右須那迦長老八六教外多異說若依異說道非能通涅槃是世尊大師以此教僧伽自示如掌上右那義陀長老八七如實見五蘊破壞諸生有輪迴生死斷今我不再生右波吃陀長老八八我身於水中不能登上陸流於大水中我能悟真諦右阿鷲那長老八九超出淤泥塗以避於深淵暴流結節脫除一切憍慢右提瓦薩婆長老九善能知五蘊斷其根本存生死輪迴盡我今不再生右沙美達陀長老攝頌長老薩美提具陀迦葉師子與尼陀須那迦與那義陀阿鷲那仙波吃陀長老提瓦薩婆仙沙美達陀長老第十品九一我得能享受種種如斯百味甘露食未曾於今日快樂無量知見瞿曇佛說此無量法右巴利奔那迦長老九二其漏已斷盡於食無依著其行之處空無相及解脫如鳥行空跡其跡實難測右毘闍耶長老九三耶羅迦諸欲是為苦耶羅迦諸欲非是樂耶羅迦以求諸欲者彼是為求苦耶羅迦不求諸欲者彼乃不求苦右耶羅迦長老九四世尊釋子吉祥者我等頂禮應歸命最上第一之達者善說最上第一法右密陀智長老九五我為眼盲者長期旅難路縱令路邊臥不伴魔羅者右奢具婆羅長者九六喜捨一朵花八億之年間諸天中往來餘福得寂滅右康達須摩那長老九七捨棄貴價黃金鉢我取土製瓦鉢者我得第二之灌頂右帝須長者九八見色思愛相正念且消失心有染著者以色之感受以此且愛執生有之根本彼後增諸漏右無畏長老九九聞聲思愛相正念且消失心有染著者以此為感受且生愛執著將來應輪迴彼增長諸漏右鬱帝迦長老一具有正勤念住天地覆解脫華無漏寂滅右提瓦薩婆長老攝頌巴利奔那迦毘闍耶耶羅迦智者密陀智奢具婆羅康達須摩那帝須無畏智者鬱帝迦提瓦薩婆第十一品一一捨在家生活不終己之務懶惰賴供食飽飼如大豕其鼻嗅如犁屢屢入胞胎右貝羅達迦尼長老一二為憍慢所欺污染諸正行利得不利得惑亂失三昧右闍睹奢長老一三飽食安樂法此非我所要食最第一味毒味勿親交右蔓陀羅長老一四我體甚輕浮以觸大喜樂我體被風吹猶如棉絮浮右氣達迦長老一五厭而不住樂亦應去明眼之士不伴不利道右摩利達萬婆長老一六百標百相之義中見唯一標為愚者見百之標為識者右斯黑曼陀長老一七我以思量後成為出家身通達於三明竟成佛之教右達摩薩瓦長老一八高齡出家百二十歲通達三明成就佛教右達摩薩瓦長老之父長老一九彼為獨居人不專意第一利濟慈愍者佛教如鹿生林中於世縱諸根右桑伽羅奇陀長老一一新樹喜雨濺繁茂在山巔遠離於諸欲以念懸森林長老烏安婆善事愈益來右烏娑婆長老攝頌具羅達迦尼闍睹奢蔓陀羅氣達迦仙摩利達萬婆長老長老斯黑曼陀仙達摩薩瓦達摩薩瓦父桑伽羅奇陀長老大牟尼烏安婆第十二品一一一出家不易在家住難法深遠富難求生活艱難求不相應常念無常適宜安樂右提恩陀長老一一二我有三明心安息而巧為大禪定家我已達己利成就佛之教右瓦奢伍陀長老一一三有澄清之水亦有大磐石黑面猿鹿群青苔覆闍瓦羅水面此等之岩山我等甚快樂右瓦那瓦奢長老一一四沙門捨離家身麤大且重貪肉身安樂如何達究竟右阿提目多長老一一五拘達奢樹婆羅基樹及山聞高名彼居山中綠林覆彼求極果住此處右摩訶那摩長老一一六自制護六根捨棄六觸處斷邪惡根本我得達漏盡右婆羅婆利耶長老一一七善能塗粧能服裝著飾一切資身具在家之身得三明而成就佛陀之教右耶舍長老一一八頹齡傾倒如咒詛如他人之形色善人之形色亦然離家無住正念人追憶自己如憶他右金毘羅長老一一九已抵達樹蔭涅槃沈胸臆瞿曇禪思深慎勿放逸行汝輕噪何為右跋耆子長老一二了知五蘊斷盡根本苦惱滅盡諸漏滅盡右伊西達多長老此處有攝頌曰捷恩陀瓦奢伍陀瓦奢瓦那婆長老阿提目多摩訶那摩老仙婆羅婆利耶耶舍金毘羅跋耆子與大名稱伊西達多一百二十數所作已作了諸漏盡長老第一結集時各章諸仙等會誦二偈集第一品一二一生是無常住行亦無常恒此等諸蘊生順次趨壞滅一二二當知此患難我不求生有遠離一切欲我己達漏盡尊者鬱多羅長老唱如是偈一二三生活有法度食勿近胸前身食辨住立我今赴乞食一二四賢者在家禮拜供應知以此為淤泥細箭穿身實難拔凡夫難捨人恭敬尊者賓頭羅跋囉惰闍唱如是偈一二五有猿入五戶予之小居舍奔奔叫不停戶戶奔環繞一二六猿汝立勿去汝今不如昔汝受智慧制由此難遠離右瓦利耶長老一二七我於恒河岸構三多羅葉以建我茅舍鉢是墳場器服著糞掃衣一二八於雨安居期我發唯一語第三雨安居我已破闇蘊右住恒河岸比丘一二九縱人有三明捨死為漏盡愚者無智者輕視彼少智一三人生於此世為求得飲食彼雖邪法徒為人所恭敬右阿智那長老一三一聞師說法時我具一切智以對說法者我不懷疑惑一三二大雄領導隊商人御者中最勝行此大道上我無所疑惑右美拉智那長老一三三茨葺之陋舍為雨之所侵心若不修練必為貪欲侵一三四善葺之屋舍不為雨所侵修練我心者貪欲所不侵右羅陀長老一三五我生將已盡成就勝者教壞羅網之稱除去生有引一三六為彼之利益出家得度者今達此利益而滅盡結縛右須羅陀長老一三七不為婦女縛牟尼睡安樂常要防護者難得於正理一三八欲為汝戕賊我等無負汝今我行無悔趣入涅槃地右瞿曇長老一三九媒鳥先害己然後又害他有翼為媒鳥因而甚害己一四婆羅門外無色內有色者婆羅門善生之主帝釋天彼實黑者有惡業右瓦娑婆長老攝頌鬱多羅與賓頭羅瓦利耶岸住仙那阿智美拉智那羅陀長老須羅陀瞿曇長老瓦娑婆有大神通十長老第二品一四一聞欲聞增長依聞智增加依智慧知義知義齎安樂一四二邊地住居樂結縛行離脫若不得歡樂此處防護己作為正念人住於僧伽中右摩訶周那長老一四三麤暴行之輩暴力以惱人亦為他人惱此業為不滅一四四善業及惡業人若造業者一一之所為為業相繞者右樹提陀娑長老一四五晝夜已過生命隨減生者命滅如小河水一四六造罪惡業愚者不覺彼後辛苦惡業果故右黑蘭遮伽尼長老一四七如於大海上乘小木筏沉若依懈怠人生活善亦沉懈怠乏精進此行應避免一四八聖者遠世間專心禪思者常精進發奮與賢者共住右蘇摩彌陀長老一四九人為人縛人依人人為人害人害人一五對彼有何求彼等受生人以害諸多人擯去行遠離右娑巴彌陀長老一五一迦利婦如大烏色股骨折又股骨折腕骨斷又腕骨斷切成骷髏如酪器自己篤信且坐定一五二無智而作有質者此為愚者再逢苦勿作有情有質者我今不再斷頭臥右摩訶迦羅長老一五三剃頭著僧伽梨得衣臥具飲食而獲眾多之敵一五四恭敬有患難知有大怖畏比丘少事得無欲遊正念右帝須長老一五五東竹林有友捨卻莫大富出家為釋子鉢受殘食樂一五六專心發精進勇猛常堅固捨卻世俗樂樂於樂法樂右金毘羅長老一五七我無正思惟專為巧裝飾輕噪而易動為欲貪所惱一五八善巧行方便日族佛覺者依佛修正行我心拔生有右難陀長老一五九己不住善定他人讚嘆此他人虛讚嘆彼不住定故一六己住於善定他人若誹謗他人虛誹謗彼自住善定右西利摩長老攝頌摩訶周那樹提陀娑黑蘭遮伽尼蘇摩彌陀巴彌陀迦羅帝須金毘羅難陀長老西利摩有大神通十長老第三品一六一我識知諸蘊我根絕渴愛我修習覺支達諸漏滅盡一六二我識諸蘊解除欲纏修習覺支無漏涅槃右鬱多羅長老一六三王名波那達宮殿黃金造橫分十六室高此有千倍一六四千階百門戶黃金造幢飾六千七倍數乾闥婆起舞右跋陀羅長老一六五正念有智慧比丘發精進往時五百劫追憶一夜間一六六四念住與七覺支八支聖道勤修習我於五百劫之時一夜之間為追思右輸毘多長老一六七應為精進事應為欲覺事為此勿怠惰勇猛見精進一六八汝且直語我直入甘露道依智知涅槃恒河歸大海右瓦利耶長老一六九我欲理我髮髮師來我處由彼我取鏡觀察我身體一七我身見空虛離去黑暗界破一切被服今我不再生右維陀索迦長老一七一一七二為達安穩地捨棄五障蓋我取法之鏡見己之知見我身之內外一一為觀察觀我內外身一切皆空虛右奔那摩薩長老一七三恰如優生馬倒而再起立奮起彼元氣如能負重荷一七四如是具正見我為佛弟子突正等覺者佛之善弟子右難陀迦長老一七五吾弟難陀迦與我赴師所最勝佛面前以為獅子吼一七六牟尼慈愍故使我等出家我等達利益滅盡諸結縛右婆羅陀長老一七七智勇勝魔王併克其眷屬我如獅子吼獅吼在山窟一七八奉侍我師尊恭敬法與僧見子除煩惱歡喜得滿足右婆羅特縛惹長老一七九以事善良士而常聽聞法直入聞不死踏行此大道一八正念捨生欲我再無生欲我先無生欲未來亦無生今我已無此右康婆陳那長老攝頌鬱多羅跋陀羅長老輸毘多瓦利耶仙維陀索迦彼奔那摩薩難陀迦與婆羅陀長老婆羅特縛慈大牟尼康婆陳那第四品一八一一八二於正覺者教自出家以來向上得解脫以超越欲界淨梵士觀我真正得離脫斷盡結縛故我已實解脫右美伽西羅長老一八三無常之小屋處處再營造求建屋舍工轉經生死苦一八四渴愛之屋工汝今已看出汝勿再構屋桷折屋頂碎心遮其進路消散於其處右西瓦迦長老一八五此處阿羅漢善逝及牟尼彼等為風惱若是有溫水婆羅門以此供牟尼一八六應供養者須供養應尊重者須尊重應禮敬者須禮敬我為牟尼除風氣右優婆摩那長老一八七我以持正法說諸欲無常見諸信男子彼等珠耳環妻或眾兒女而為憧境望一八八不知如實法謂諸欲無常無破染著力依賴妻子財右伊西陳那長老一八九雨降與雷鳴獨住惡凹地獨住凹地中無畏無驚悸身毛不豎立一九獨住惡凹地無畏無驚悸身毛不豎立此乃我之性右桑布羅喀奢那長老一九一若人心端立喻如盤石住染著中不動而離於染著應怒不作怒如是以修心苦由何處來一九二我心若端立猶如盤石住染著中不動而離於染著應怒不作怒如是心修練處處苦不來右奇陀迦長老一九三星宿為鬘飾不於夜睡眠如斯漫長夜為驚覺智人一九四我由象背墜象獨向前行我若敗戰生不如戰勝死右菩提利耶兒索那一九五可喜可樂捨五種欲信心出家諸苦滅盡一九六死亦無歡生亦無歡正知正念只待時至右尼娑婆長老一九七似菴羅新芽於肩披衣服騎象頸乞食而入於村落一九八爾時象背降動時我憍慢然後成寂靜達諸漏滅盡右烏娑婆長老一九九伽婆陀具羅此我襤褸衣麤重之衣服瓶中濺甘露修禪為行道二汝伽婆陀請勿坐瞌睡勿擊汝耳朵伽婆陀汝於僧眾中不辨睡眠量右伽婆陀具羅長老攝頌美伽西羅西瓦迦優婆摩那賢者伊西陳那喀奢那大宗主奇陀迦菩提利耶之兒尼娑婆烏娑婆長老伽婆陀具羅第五品二一諸佛不思議諸法不思義不思議我師我師所成就佛子於此處如是以證法二二於無數劫間獲得無數身其中最後身積集生死輪此為最後者今更不再生右鳩摩羅迦葉長老二三雖然年紀少專心向佛教睡中若有覺生活即不空二四智者思佛教信心戒靜穩應專為法見右護法長老二五諸根歸寂靜御士善訓馬棄慢漏盡者如是天所羨二六諸根歸寂靜御士善馴馬我棄慢漏盡諸天所羨慕右普羅夫摩利長老二七摩伽羅迦色惡心善者汝常住安定比丘雪降寒季夜汝如何起居二八摩揭陀國充滿穀物我聞他處住安樂人我葺草屋於心滿足右摩迦羅奢長老二九勿自滿亦勿輕他勿罵渡達彼岸人於群集中勿虛浮言靜行善勿自讚二一見極微妙義巧慧行謙遜善習事佛者不難得涅槃右潘奢利之兒毘舍乞十佉長老二一一好冠好尾好青頸好嘴好音孔雀叫大地善生諸花草善水浸潤空覆雲二一二善意之人身體健禪思佛教善出家微妙難見極淨白獲得最上不滅道右鷲羅迦長老二一三歡樂心徘徊如立杭木處有杭木圓木我欲赴其處二一四我心我呼汝姦惡我心呼汝不誠實我師難能得勿陷我不利右阿拏波摩長老二一五闇昧凡夫輾轉諸趣不見聖諦長時迴轉二一六我為精勤破除輪迴除滅生趣今更不生右瓦智陀長老二一七菩提樹之下青草有光輝於樹鬱茂處得一佛念想二一八三十一劫前我得一念想以此念想住我得漏滅盡右桑第陀長老攝頌長老鳩摩羅迦葉護法普羅夫摩利摩迦羅奢毘舍佉鷲羅迦阿拏波摩瓦智陀除煩惱膩垢之桑提陀長老於第二品偈頌九十有八熟知方策者四十九長者所誦出三偈集二一九不淨生中索清淨我於林間事火神於此不知清淨道我行苦行求不滅二二我依安樂道已得此安樂良法達三明可成佛之教二二一先為親梵者今為婆羅門三明洗浴者吠陀通聞者右安迦尼佉波羅多瓦奢長老二二二我出家五日未達羅漢果有學入精舍心中起誓願二二三渴愛箭未拔不飲與不食亦不出精舍脇不著席臥二二四如是住勤修勇猛見精進通達三明法成就佛之教右波奢耶長老二二五先前應為事後時欲望為彼由安樂地墮落後又悔二二六為始能言不為不言唯言不為識者知之二二七正等覺者說示涅槃實極安樂無憂無塵寂靜安穩苦滅無存右薄拘羅長老二二八希望沙門道生活願安樂僧伽衣飲食不可以輕視二二九希望沙門道生活願安樂見坐臥之處猶如蛇鼠穴二三希望沙門道生活願安樂修習之一法右達尼耶長老二三一極寒與極暑如是云極遲放棄青年業機會逸失去二三二唯見寒與暑不及見草木為丈夫義務彼不遠安樂二三三突婆與孤沙婆陀其羅草優尸羅根們叉草波羅婆草等我心專遠離遠離此等草右摩登伽兒長老二三四波吒梨子城住一人沙門巧說而多聞彼為長壽者屈闍須毘多於此門邊立二三五波吒梨子城住一人沙門巧說而多聞彼為長壽者彼為此風吹於此門邊住二三六善戰善供牲又為戰勝者且是行淨行彼安樂增長右屈闇須毘陀長老二三七彼於人間中害他生類者此人此彼世而墮落兩處二三八又以慈愛心愍一切生類世間如是人多積諸善業二三九修習諸善語奉事諸沙門獨坐修禪定安心得寂靜右瓦羅那長老二四諸親族中無信心一人有信有智慧彼為立法持戒者為此親族謀利益二四一我依慈愛制親族詰責親族由愛心比丘眾中奉行事二四二彼等逝去時天界獲安樂我母與兄弟快樂享諸欲右婆西迦長老二四三四肢伽羅樹結節身體瘠瘦現脈管飲食知量心不貪二四四森林大林中虻蚊所螫噬如臨戰場象堅不失正念二四五獨自如梵王二人如天人三人如村夫過此有諍鬥右耶須奢長老二四六汝先有信心今日汝已無汝有汝所有此非我惡行二四七信心無常而動搖如是我已見此事人之好愛與厭嫌牟尼不為此老朽二四八牟尼善調理乞食至遊行我尚有脚力右婆蒂摩蒂耶長老二四九我依信心而棄世新得度之新發意清淨自活無懈怠我當交此善知識二五我依信心而棄世新得度之新發意住大眾中賢比丘如是應學於戒律二五一我依信心而棄世新得度之新發意熟知應作應不作如此單獨可遊行右優波利長老二五二我思求賢者利益已滿足世之五欲惑不為所纏倒二五三我入魔王域為其堅箭刺能由死王網我今得解脫二五四我捨離諸欲破一切生有斷生死輪迴今無有再生右烏陀羅婆羅長老二五五總來集此處諸親族諦聽我為汝說法受苦再再生二五六發奮起出離傾心於佛教摧毀諸魔軍如象摧葦家二五七停住於此教住為精勤者捨離生死輪盡苦惱煩際右阿毘普陀長老二五八我今流轉赴泥犁再再餓鬼之世界屢墮畜生且苦久二五九生人世界喜入於天界稀色無與色界於非無想處居非有想處二六一切生成法皆無有精質造作而動轉了知常浮動以了知此理正念自然生獲得大寂靜右瞿曇長老二六一二六三人之應先為二二五二二七右哈利陀長老二六四擯斥惡友交上上人願樂不動止彼誡所二六五二六六於大海上一四七一四八右毘摩羅長老攝頌安迦尼佉波羅多瓦奢婆奢耶薄拘羅仙達尼耶摩登伽兒須毘陀瓦羅那仙婆西迦耶須奢長老娑蒂摩蒂耶優波利烏陀羅婆羅阿毘普陀瞿曇哈利陀於第三偈集毘摩羅長老入涅槃偈頌四十八十六長老世稱頌四偈集二六七裝飾纏美衣身塗旃檀著花環彼於大道群眾中舞女五樂合鳴舞飛飛二六八我為乞食入城去往見彼婦身裝飾身纏美衣著花飾宛如死王網所繫二六九依此我起正思惟現見患難情生厭二七由此心解脫見法之良質通達三明法成就佛之教右那迦娑婆摩羅長老二七一為睡眠惱我出精舍上經行處臥其地上二七二我摩擦肢體再上經行處內心住安定經行處經行二七三二七四由此我二六九二七右婆咎長老二七五我等此世滅愚者不覺此若人能覺此此世爭自息二七六人若無智時令滅而不滅能知正法者猶如病者中而為無病者二七七放逸行為有污禁戒獨豫梵行不齎大果二七八修梵行者不尊敬法遠離正法如地離空右娑毘耶長老二七九魔王諸物滿惡臭點滴落下此身災汝身亦有九個孔液汁由此常流出二八勿輕古人勿惱如來在天無染況於人間二八一愚人有邪智邪意愚癡覆魔王投結縛是人被染著二八二貪欲瞋恚無明應遠離如斷絲解縛此處無染著右難陀迦長老二八三五十五年間我身塗塵泥月吃一回食鬚髮盡拔脫二八四一脚而獨立從不用臥牀我食乾糞橛不受施者食二八五我行導惡趣如斯多造業我為大水漂歸依奉佛教二八六如是我歸依見法之善質通達三明法成就佛之教右江普迦長老二八七伽耶之頗勒婁那月我來伽耶城正等覺者佛說最上之教二八八佛有大光明眾中最上師人天界勝者殊勝無倫比二八九龍象大雄士無漏大光輝一切煩惱盡何處亦無畏二九永無塵垢污亦無邪見縛使我賽那伽一切結節脫右賽那迦長老二九一應急卻徐徐應徐卻急急愚者處理事無理受苦惱二九二此人利益損恰如黑分月彼得到不幸亦妨諸友誼二九三徐時當徐徐急時當急急賢者處理事正當獲安樂二九四此人利益增恰如白分月稱譽獲名聲亦不妨友誼右三浮陀長老二九五羅睺羅跋陀具有二之德智者稱頌我我為佛之子又於諸法上具有眼見力二九六我漏斷盡今不更生我為羅漢堪為應供具有三明見無滅法二九七耽諸欲之輩邪網之所覆渴愛蓋所縛恰如筌中魚二九八我捨此欲解魔之縛拔渴愛根清涼安靖右羅睺羅長老二九九黃金覆身侍婢群侍抱兒於脇妻來近我三此近來者我兒之母身飾美服如繫死網三一三二二六九二七右旃檀長老三三正法維護法行者善修諸法齎安樂修行善法有功德不陷惡趣法行者三四法與非法者果報不同一非法導泥犁正法生善趣三五然而對諸法心起之喜悅如是善來喜於法善住立善逝賢弟子歸依最上尊如是受指導三六斷惡瘡根破渴愛網彼盡輪迴一物無礙猶十五夜滿月之月右壇美迦長老三七清翼白鶴畏黑雲於是尋索避難處避難之處所逃去阿奢迦羅尼河娛三八清淨純白鶴畏怖此黑雲尋索庇護處於此尋不出阿奢迦羅尼此時使我娛三九兩岸閻浮樹無人不娛快樹有大嚴窟背後河岸美三一蛙脫蛇群徐徐鳴今非由小川移住時往阿奢迦羅尼河安穩平和甚快樂右娑婆迦長老三一一我由生活之心要出家我受具足戒由此獲得深信心強力精勤勇猛進三一二且讓身壞肉片片解兩膝關節雙脚脫落三一三渴愛箭不拔不食亦不飲不出此精舍而脇不著席三一四如是二二四右無提陀長老攝頌那迦娑摩羅婆咎婆毘耶又難陀迦江普迦賽那迦三浮陀羅睺羅栴檀長老此等十名佛弟子壇美迦娑婆迦與無提陀亦有此三名偈頌共為五一二長老共有十三名五偈集三一五比丘以赴於墓田婦女死體捨塚間而被蟲類所食噉見此屍壞之事情三一六見死惡屍起嫌厭情我起欲貪愚夫失精三一七速於飯熟離彼處去勿喪正念坐於一方三一八三一九依此二六九二七右羅奢達陀長老三二專於不適業尋求終目標無得所尋求此為悲運相三二一若人得拔煩惱處棄之如同投骰子如能一切皆棄捨如盲不見凹與凸三二二二二六同三二三猶如美華有色無香善說語者不行無效三二四猶如美華有色加香善說語者行之有效右須普陀長老三二五降雨之音如調律我葺屋舍防風樂我心寂靜住其處如是雨若降即降三二六三二九降雨乃至我心止息歸住處乃至我以貪欲以瞋恚愚癡以捨離而住其處如是雨欲下即下右義利摩難陀長老三三諸法之中如師所望示我樂所無滅之法我自應作所作已辦三三一如斯法說非外道我自逮得己證知我解疑惑有淨智來於汝前為解說三三二我知宿住得淨天眼逮得己利成就佛教三三三精勤汝教能聞三學我漏總滅今不再生三三四汝訓以尊道愍我汝攝取汝教示不虛我敬為弟子右須摩那長老三三五善哉母驅策我聽母之言母教起精進成最上菩提三三六我為羅漢具應供德有三明法見不滅道克魔王軍住於無漏三三七或內或外所存諸漏斷盡無餘不復再起三三八大姊賢良唱此義曰汝於我等勿思愛著三三九斷盡苦惱積最後身渡生死輪今不再生右瓦陀長老三四佛實為我益尼連禪河來我聞彼之法捨棄諸邪見三四一種種犧牲供養火神盲目凡愚思為清淨三四二迷入邪見之密林我為戒禁取所惑盲目無智為不淨我則自思為清淨三四三我捨邪見壞諸生有供德火神禮拜如來三四四我捨諸愚癡壞生有之愛以盡生死輪我今不再生右那提迦葉長老三四五早時午時哺日日為三度我於伽耶城春月入水流三四六我曾於他世我犯邪惡業使罪流入水我先如是見三四七善巧說明語聞具法義道我為正觀察真正如實義三四八我洗除邪惡無垢淨潔白清淨續清淨我為佛生子三四九八支潛流以流邪惡通達三明成就佛教右伽耶迦葉長老三五風疾不得止汝住森林中粗乏行乞地比丘如何為生活三五一以廣大喜樂充我積集身受用粗食物我住森林中三五二修習四念住五根與五力以及七覺支我住於林中三五三專心發精進勇猛常堅固一致見和合我於林中住三五四調順最第一息心住安定追憶等覺者晝夜無懈怠我住於林中右跋迦犁長老三五五我心我欲制止汝如象止小門由汝生欲網令汝勿促邪三五六制止汝勿進如不開象門禍心汝數用暴力勿以惡為快三五七猶如新捕未調象我亦以鉤善調御善能轉此調御者同樣如我轉汝心三五八猶如御駿馬御者以巧勝如調馬生善五力調汝心三五九以正念縛汝調御汝自清精進負荷重由此勿遠行右維智陀闍那長老三六怨心智鈍者聽聞勝者教遠離於正法猶如地離空三六一怨心智鈍者聽聞勝者教卻退離正法恰如黑分月三六二怨心智鈍者聽聞勝者教於正法枯竭猶如少水魚三六三怨心智鈍者聽聞勝者教正法無增進如田腐種子三六四能以喜樂心聽聞勝者教捨除一切漏證知不動法達至上寂靜入無漏涅槃右耶娑達陀長老三六五我受具足戒得無漏解脫我得見世尊共住精舍中三六六世尊於夜中久居於屋外精於居舍事我師入居舍三六七瞿曇展敷僧伽梨石窟設臥牀如同獅子臥捨離諸怖畏三六八依此善言語正覺佛弟子索那於佛前說示佛正法三六九普識五蘊修習佛道而成無漏至上寂靜右索那庫蒂堪那長老三七賢而知師言住此起珍借彼實歸依人亦是為識者諸法差異通達人三七一假令天災起有念不能挫彼實強力者亦是為識者諸法差異通達人三七二住止如大海無欲智慧深見微妙義者三七三多聞護持法隨法行法者如是行法者亦是為識者諸法差異通達人三七四以知所說義知義如義行彼實有內義亦是為識者諸法差異通達人右庫闍耶長老攝頌羅奢達陀須普陀長老義利摩難陀須摩那與瓦陀那提迦葉伽耶迦葉跋迦梨與維智陀耶娑達陀與索那庫闍耶六十五偈是有十二長老六偈集三七五親見瞿曇之神變嫉妒憍慢瞞我不肯謙卑三七六知我所思惟調御師責我依此我感激身毛直豎立三七七為結髮外道我得小神通爾時為無用出家勝者教三七八先以足供犧為欲界大事後對貪瞋癡一總並捨去三七九知宿住淨天眼有神通知他心亦逮得天耳明三八我為得此道出家以得度我今達此利盡一切結縛右優羅頻羅迦葉長老三八一魔王收納粳米稻白稻落地上我不得乞食我應為如何三八二長老以追余佛陀其不可思量和悅身喜觸踴躍常歡樂三八三三八四法不可思量乃至不可思議僧乃至三八五魔王汝今住屋外夜寒有雪氣勿為惱害寒入閂鎖精舍三八六長老我觸四無量依此住安樂我心無動轉故住寒不惱右提乞奢迦尼長老三八七共修梵行人不尊敬彼者卻退正法事如魚少水中三八八共修梵行人正法不增進如田之腐種三八九共修梵行人彼於法王教遠離涅槃道三九共修梵行人尊敬彼等者正法不卻退如魚大水中三九一彼共修梵行正法有增進如田之良種三九二共修梵行彼於法王教趣於涅槃傍右摩訶那伽長老三九三堀羅赴墓田女尸捨塚間尸體蟲類噉彼見壞女尸三九四堀羅汝為病所侵見不淨不潔貪欲失精下愚人之所歡三九五為得智見我取法鏡對此空身內外觀察三九六如此彼亦是如彼此亦是如下上亦是如上下亦是三九七如於日中夜間亦然如於夜間日中亦然如先有後如後有先三九八以五絃樂娛心專於一境得見正法人如是更喜樂右堀羅長老三九九放逸行之人渴愛之增長恰如生蔓草彼生生輾轉如猿求果實四渴愛賤且毒人若為所勝增長彼憂苦猶如繁茂生彼毘羅那草四一人調難調欲為此勝渴愛憂苦而去彼如水滴荷葉四二我告汝等來集者全部汝等有祥福掘愛根求優尸羅如掘香草毘羅那如葦草根被流折汝等勿為魔所破四三行佛之言教寸時勿空過寸時空過者憂墮地獄故四四放逸有塵垢放逸隨塵垢明智不放逸拔除己之箭右摩倫屈耶弗陀鬘童子長老四五我由出家二十五年一彈指頃心得寂靜四六心不得一境為欲貪所窘扼腕我哭泣而出於精舍四七我乃持刀來我生有何用如我拋棄戒應如何就死四八爾時取剃刀我就己牀座為切斷脈管拔起此剃刀四九四一我依此二六九二七右薩婆達沙長老四一一伽提耶那起坐汝清醒勿為多睡者怠惰放逸族難勝死王計四一二震動如大海生老伏縛汝為己作良洲無為他依處四一三師為設道此道顯著超越生死以及怖畏初夜精勤專心堅固四一四著僧伽梨先解縛剃刀剃頭食乞食勿耽睡眠遊戲樂入禪定迦提耶那四一五迦諦耶那勝得靜禪思熟通安穩道無上靜涅槃如水之滅火四一六燈火少光明似風撓蔓樹如是姓因陀娑性迦諦耶那汝亦勿取執撼動魔王窟諸受離貪欲此世清涼身待到死之至右迦諦耶那長老四一七日種具眼佛超一切結縛滅除輪迴路巧說示法門四一八涅槃渡彼岸枯竭渴愛根壞毒根刑場成涅槃之道四一九破無智根本除作業機械去諸想執著投智慧金剛四二知悉諸受離脫諸取智觀生有如觀大坑四二一深遠有大味以遮止老死遵行八聖道安泰息苦惱四二二知業是業知果是果如實照觀緣生之法行安穩地善良之人可以終也右爾伽奢羅長老四二三醉生命之財權惑身形之顏色如是而徘徊四二四思無人勝己過慢心所傷傲慢愚頑迷四二五父母不恭敬我憍慢頑迷對人無敬念亦不作一禮四二六第一之導師於調御者中乃為最優者光耀如太陽比丘眾恭敬四二七捨卻慢與迷以清和之心而以頭禮拜生類最上者四二八善除捨此過慢卑慢斷我有念諸類慢盡右提恩陀長老四二九我年甫七歲而就出家時以神變之力降伏神龍王四三阿耨達大池為師運水來世尊瞥見我作此之宣說四三一舍利弗近來見此兒此兒攜水瓶內心能住定四三二行為可愛威儀良阿㝹樓陀之沙彌彼依神變離恐怖四三三依良訓人而良訓依行善人而為善終勤阿㝹樓陀教四三四彼達最上之寂靜證得不動轉之法彼為沙彌須摩那願以對我勿輕賤右須摩那長老四三五風疾不得止汝住森林中粗乏行乞地如何為生活四三六以廣大喜樂我充積集身受用粗食物我住森林中四三七增修七覺支五根與五力具有禪定樂而住於無漏四三八離脫諸煩惱以持清淨心觀察無染人而住於無漏四三九或內或外我有漏所斷盡無餘無復再起四四遍知五蘊斷除根本苦惱滅盡今不再生右如波達迦牟尼長老四四一無忿調順平等生活能知解脫而成寂靜如是之人何來忿怒四四二對忿者忿彼則愈惡對忿不忿勝於難勝四四三自他兩利知他忿事正念之人而歸寂靜四四四或自或他為兩者醫不通法者想是愚蒙四四五若汝起忿譬喻思鋸若起欲味思念兒肉四四六汝心若欲起諸欲終日奔馳生有間疾以正念來制服如制惡畜食生穀右梵摩達多長老四四七對掩覆者降雨對開顯者勿降如此使覆者顯則此無須降雨四四八世為死所擊而為老所圍渴愛箭所刺慳貪所常燻四四九世間為死所打擊又常為老所包圍常無依而蒙受害如逢盜人執刃杖四五老病死三者迫來如火聚對此無抗力躲避不敏速四五一光陰少或多對此勿空過過去一夜時此汝生命減四五二遊行與住立著座與偃臥最後一夜迫非汝放逸時右闍利曼達長老四五三人之兩足身不淨有惡臭充滿多死屍處處流污垢四五四隱鹿為罠陷游魚上釣竿猿猴為黐黏凡夫被捕捉四五五色聲香味所觸可愛五種之欲婦女身具四五六以愛樂之心此等婦女交擴可懼墓田積再生此身四五七避此等婦女如足避蛇頭彼持有正念此世毒執伏四五八諸欲有患難出離得安穩遠離一切欲諸漏達滅盡右薩婆迦摩長老攝頌優樓頻羅迦葉提乞奢迦尼長老摩訶那迦屈羅摩倫屈鬘童子薩婆達沙迦諦耶爾伽奢羅捷恩陀有名長老須摩那如波達迦牟尼仙梵摩達多闍利曼達薩娑迦摩偈頌共有八十四此處長老十四名七偈集四五九纏美衣著華鬘莊校嚴飾足塗蟲脂穿履遊女四六脫履我面前合掌柔和聲彼女禮敬我向我宣說曰四六一汝齡尚幼稚緣何而出家汝可從我言享受人界欲我將贈汝財我為真實語若汝不信我持火來宣誓四六二汝與我老朽共有憑杖時兩者俱出家兩處有幸福四六三美衣身莊嚴死魔張羂索遊女來合掌向我為見求四六四四六五依此而我起正思惟現見患難情生嫌厭由此心解脫見法之良質通達三明法成就佛之教右孫陀羅沙無陀長老四六六安婆陀迦林遊園之彼方跋提耶已拔此渴愛之根於此幸禪思四六七或以杖鼓或以箜篌或以小鼓有為樂者我於樹下佛教為樂四六八佛與我惠我得此惠對世間人恒持身念四六九量我以形色追我以音聲欲貪貪欲輩實不能知我四七內既無有知外亦無所見四方礙愚者彼為音聲誘四七一內既無有知觀外見外果彼亦於為此音聲所引誘四七二內既有所知外亦有所觀見無障礙人不為音聲誘右羅毘陀迦跋提耶長老四七三我為獨子母之愛兒多為苦行祈願而得四七四為願我之利父母共求益二人共愍我將我捧獻佛四七五艱難得此兒華奢且柔弱世尊我等今捧獻勝者之侍者四七六師受取我告阿難曰速使得度教為善者四七七師使我得度勝者入精舍太陽尚未昇我心已解脫四七八師從靜思起召我來跋陀謂此我受戒四七九我生甫七歲得戒達三明此誠不思議佛法善安排右跋陀長老四八樓閣之蔭上人經行我見其處近前禮拜此最上人四八一衣披一肩以合掌一切生類最上者隨離塵尊而經行四八二善問知解者由此質問我無懼無恐怖向師為應對四八三如來對問答表隨喜之意彼顧比丘眾宣示此意義四八四多福哉鴦伽摩偈陀國人彼來獻衣食臥牀與資具受迎拜恭敬彼等幸福哉四八五世尊說曰蘇婆迦汝由今日後為見我近來蘇婆迦此亦為汝受戒四八六生齡甫七歲而得具足戒持此最後身誠不思議哉佛法善安排右蘇婆迦長老四八七以手折葦設棲小舍世人一致與名破葦沙羅蔓伽四八八今日以我手不應折茨葦瞿曇名聞高為我制戒法四八九沙羅蔓伽於先所有不見一病超天子者語得見此病四九毘婆尸佛之跡尸棄毘舍浮兩佛之跡拘留孫拘那含牟尼及迦葉佛之道跡瞿曇佛由此而往四九一離貪愛而去取著七佛入於滅盡佛說法如是依佛得正道四九二四種之聖諦愍生類故說苦集與正道苦滅盡滅四九三輪迴起時無限苦此身破壞命滅盡斷除貪欲無報著於一切處得解脫右沙羅蔓伽破葦長老攝頌孫陀羅沙無陀羅毘達迦跋提耶跋陀長老蘇婆迦沙羅蔓伽大仙七偈集五人長老偈頌三十五八偈集四九四勿多作業遠眾人模他競他勿努力元氣旺求諸味者捨棄安樂之福利四九五賢者俗家之禮拜供養應以知此是淤泥猶如細箭難拔去難捨惡人之恭敬四九六非因他之有情而積邪業自己之故有情乃業所繫四九七依他人語不為盜人依他人語不為牟尼如知自己諸天知彼四九八我等於此滅愚者不覺此人若能覺此依此自息爭四九九有智慧人失財仍生不得智慧有財無生五總以耳聞總以眼見不捨見聞賢者相應五一有眼猶如盲有耳猶如聾智者猶如啞強者猶如弱所作已辦時可以死牀臥右摩訶迦旃延長者五二無偽無忿恨遠離兩舌者如斯之比丘來世無憂慮五三無偽亦無恨遠離兩舌者防護諸根門如斯之比丘來世無憂慮五四無偽戒善之比丘來世無憂慮五五無偽友善之比丘來世無憂慮五六無偽良智之比丘來世無憂慮五七信心對如來確立無動搖善戒賢聖樂世間所讚歎五八喜悅對僧伽即時有識見彼等非貧者生活亦不空五九智者憶佛教信心與戒律喜悅與法見對此皆專修右闍利彌陀長老五一遠離怖畏師我得始見時人中最上者我心起感動五一一伸手與屈足福運之迎來彼作如是求不得師惠愛五一二爾時別妻子捨去財穀物剃除鬚與髮出家我得度五一三辨別三學生活規矩善制諸根禮等覺者任為何物住於不敗五一四我起誓願心望此果非拔愛箭寸時不坐五一五我如是住精進勇猛通達三明成就佛教五一六我知宿住淨得天眼有應供德為阿羅漢而得解脫無再生質五一七由此入夜更日上時涸盡渴愛結跏趺坐右摩訶半託迦長老攝頌摩訶迦旃延第長老一闍利彌陀摩訶半託迦此等八偈頌共為二十四九偈集五一八愚夫執老病識者以為苦識苦生正念而起禪思時無憂得此樂五一九苦惱齎有毒眾多迷妄苦持生捨渴愛正念禪思時無憂得此樂五二正見導四分四向四果安穩煩惱淨得以智慧見正念禪思時五二一無憂離垢穢無為成靜寂淨除諸煩惱破壞結縛道正勤修習時五二二空中雷鼓響鳥群瞞四方豪雨傾注來比丘入山窟正念禪思時五二三花叢有雜色瓦奈耶香草飾河岸邊坐妙意禪思時五二四無人森林中中夜有雨降有牙獸類吼比丘入山窟正念禪思時五二五山間依巖岫我己止疑念離恐怖剛愎正念禪思時五二六安樂除垢穢滅剛愎憂悲無林無關鑰無箭漏已盡正念禪思時無憂得此樂右菩陀長老攝頌於九偈集見如真長老普陀唯一人如犀角偈頌亦計共九首十偈集五二七大德尊此樹真紅色光輝如火焰捨葉求果實大雄尊應分法味時五二八樹花開可愛香氣普四方捨葉求果實大雄尊由此行動時五二九勿過寒亦勿過暑大德尊今當快樂旅季節釋迦族與拘利族見尊向於倫毘尼河渡五三望田播種望田耕齎財商主望入海我由所存處所望而願所作得成就五三一人們再再來播種天王再再降甘雨耕夫再再耕田地穀物再再入國土五三二乞士徘徊再三施主施與再三施主布施昇天昇入天界再三五三三雄者生於廣智家實淨七代之父母想天中天能為此依此汝名真牟尼五三四淨飯即為大仙父摩耶即為佛之母菩薩被護母胎中身壞昇天享喜樂五三五瞿曇彌佛姨母死時享受天上欲天子群圍繞五種欲喜樂五三六不可堪忍我能忍絕無倫比之此佛鴦耆羅娑放光者之子釋尊汝為我父之父瞿曇尊依法汝為我祖父右迦留陀夷長老五三七若前若後無他人時獨住林間有大安樂五三八我佛讚森林而獨赴其處獨棲為專念比丘安樂所五三九獨急行入林狂象常出沒向道喜樂處專心為法利五四美花開寒林冰冷山窟中四肢為水濺我獨為經行五四一樂住大林中我為唯一人並無第二者住於漏盡事何時將有成五四二如是思欲為我所願成就唯我欲成此他非為作者五四三我欲著甲冑入於大林中不達漏滅盡不由此中出五四四冷風吹來微妙香氣我坐山巔破無明闇五四五林中為花掩寒冷洞窟中解脫得安樂我樂居山廓五四六我於此今日成滿我所願猶如滿月夜一切諸漏盡今我不再生右耶迦毘訶利耶長老五四七非敵非益友兩者於心中深觀未來者兩者皆不見五四八入出息念善修習成就而次第積集如佛所說照世界猶如光明脫雲月五四九我心實淨修練無限理解抑制四方光輝五五人有智慧財亡仍生不得智慧有財無生五五一智辨別所聞智增長善名若人有智慧苦中得安樂五五二有情生與死非為今日有此則有何有奇怪驚嘆事五五三世有生之物生而必有死此生生而死是為生命法五五四他人之生為有利此對死者為不利死之悲泣非名譽亦非世間讚美事一切沙門婆羅門對此亦不為稱歎五五五悲泣害身眼色力智衰敗四方不歡樂親屬不安樂五五六故願在家者得知多聞人由彼智分別力能超越業如河漲須船渡右摩訶劫賓那長老五五七我之進步遲我先被輕蔑我兄追我出汝速還家去五五八如是被趕出伽藍房舍中願不失佛教愁然獨自立五五九世尊現其處親手撫我頭並牽我之手導入伽藍中五六世尊憐愍我親與拭足巾世尊言汝心住一境心得入淨定五六一我聞世尊語樂住於佛教為達最上利涅槃不斷行三昧五六二我知宿住清淨天眼逮達三明成就佛教五六三周那半託迦化作一千體樂坐菴羅林待報供養時五六四我師遣使者報我供養時我身現空中五六五我禮師足坐於一面禮敬而坐請師攝受五六六世間祭壇能受施者人間福田師受供養右周那槃陀迦長老五六七雜多不淨物滿溢大糞器大疽腫瘡傷恰如泥沼滿五六八膿血充滿身沈糞坑流出水液腐水常滲五六九身縛六十腱塗著內硬脂外著皮之鎧無用腐臭身五七內繫骨之再結筋之經多有互相連堪忍諸行動五七一依身起欲念此人棄此處神疲力不堪必至死王側五七二身為無明障四種結節縛身沈入瀑流隨眠之網掩五七三五種障蓋繫疑惑之所有渴愛之根追愚癡蓋所蓋五七四此身業車載如是而輾轉成者終須壞壞滅諸生有五七五此身思我有闇昧凡夫輩擴展懼墓田再再須受生五七六捨此腐臭身如塗糞之蛇捨棄生有根入無漏涅槃右劫波長老五七七離城少雜音猛獸出沒處比丘為靜思受用居是處五七八塚間或街路持有塵布來以縫僧伽裟著用粗服衣五七九比丘自降心守護諸根門調御善自制家戶乞食行五八粗食心滿足勿多貪美味心著諸味者不樂靜禪思五八一少欲知滿足牟尼遠離他在家出家者不混共同住五八二表示自己事恰如鈍又啞識者於群集非時不可言五八三彼不罵何人遠避諸害事自攝於戒律知量於飲食五八四巧執相者知心之起時順觀止勤加修習五八五精進不休息常應自努力不盡苦惱際識者不信賴五八六憧憬清淨得如是住比丘漏盡趣達涅槃右婆檀提之子優波斯那長老五八七於此佛教處知自己之利入於沙門道觀察作適語五八八此教有良友於此廣修學欲聞師之教此所適沙門五八九對佛有敬意如實尊崇法尊敬眾僧伽此所適沙門五九行處親近處生活無難所確立清淨心此所適沙門五九一勤行具自制應具愛威儀住止增上心此所適沙門五九二牟尼住邊鄙騷少森林中受用為棲所此所適沙門五九三持戒與多聞如實研究法曉了真諦理此所適沙門五九四世間為無常無我不淨想世間不樂想此所適沙門五九五七覺四神足五根與五力修習八支道此所適沙門五九六牟尼捨渴愛諸漏根本壞寂靜住解脫此所適沙門右瞿曇長老攝頌迦留陀夷耶迦毘訶利耶長老劫賓那周那槃陀迦劫波優波斯那與瞿曇共為七長老於此偈集亦有七十頌十一偈集五九七我兒汝於森林雨季中如同烏鷲哈那鳥季節之風汝有樂汝入定中遠離故五九八季節風拂雨時之雲遠離繫想而弘擴之五九九卵生黑色鳥徘徊於塚間使我聚合身離欲起正念六不為他護亦不護他如是比丘無有期望以臥安樂六一有澄清水有大磐石猿鹿群集闍瓦羅水草上覆此等岩山為我樂處六二森林岩峽邊鄙洞窟邊鄙棲處猛獸往來即我棲處六三此等之生類至受打屠苦思惟此卑過我不知起坐六四我奉侍師成就佛教我卸重擔滅生有因六五我為成利益出家已得度今得有成就斷盡諸結縛六六我不欣死亦不欣生如僕務終靜待時至六七我不欣死亦不欣生正知正念靜待時至右三奇奢長老攝頌長老三奇奢長老唯一人所作己辦諸漏已盡等十一頌十二偈集六八此世於此處惟戒善學習能行戒律者能得顯達故六九智者守護戒望求得三樂稱讚與獲益歡喜生天界六一持戒自制多得友誼破戒行惡朋友遠離六一一若為破戒人惡名獲誹罵若為持戒者聲譽受讚歎六一二戒是第一住亦為諸善母法中最第一然而守淨戒六一三戒是諸護岸亦使心光明一切佛船埠然使戒清淨六一四戒力無比最上武器最尊莊嚴稀有甲冑六一五戒勢強大鞏固堤防無上薰香最上塗香人能塗此由方赴方六一六戒為第一之旅資戒為最上之路銀戒為第一之運載持戒之人行諸方六一七愚者戒上無定住於此世間得誹罵死後愁苦於地獄於一切處有憂苦六一八賢者戒上有定住於此世間得稱譽死後喜樂於天上於一切處有喜樂六一九此處持戒為第一而為智者最上法無論人間天上界有戒智者有勝利右尸羅瓦長老六二我生貧賤家貧窮又乏財我為除卑業清除不淨物六二一人人忌嫌責罵於我我以卑心對人禮敬六二二等覺大雄者比丘眾圍繞進入摩揭陀我等得見奉六二三我捨棄擔杆近前為禮拜人中最上者慈愍佇觀我六二四我得拜師足立於一隅時我求最上者允許我出家六二五世間悲愍師人間慈哀者佛對我言曰善來比丘此為我受戒六二六精進無懈怠獨住森林中我依師言行如教為勝者六二七我於夜初分以憶念前生我於夜中分天眼成清淨而至夜後分碎滅諸闇蘊六二八夜之明方日上之頃因陀羅天帝釋天梵天同來合掌禮拜六二九彼等言曰歸命人間生勝人歸命人中最上人汝為諸漏滅盡者尊者汝為堪受供養者六三時師見我天子圍繞面露微笑言此義曰六三一苦行與梵行自制與調順此為婆羅門最上婆羅門右須尼陀長老攝頌十二偈集有二人尸羅瓦與須尼陀此二長老大神通偈頌共為二十四十三偈集六三二嘗於鴦伽王領土曾為高位之從者蘇那今日勝諸法滅盡苦惱達彼岸六三三斷五下分結捨五上分結更修練五根最後超五著比丘而稱為渡瀑流人六三四虛偽與放逸比丘有外欲乃於戒定慧不至成圓滿六三五應為而捨棄不當為而為虛誇與懈怠諸漏日增長六三六人常精進修身觀念當遠非事常行是事正念正知諸漏滅盡六三七說示直道往而勿還勉勵自己成就涅槃六三八我精進努力世間無上師具眼者譬喻為甚深以法而說示六三九我聞其言樂住其教達最上利為諸行止逮達三明成就佛教六四專一出離我不瞋恚滅盡諸取遠離害心六四一專一滅渴愛人心無愚癡澈見生起處我心善解脫六四二善得解脫心歸寂靜當為既為比丘為終更不積業可為已無六四三恰如一塊石成山不為強風所搖動等同色聲香味觸六四四可愛不可愛之法亦如斯人不動心其心住立離繫結破除五蘊觀滅盡右蘇那拘利毘沙長老攝頌十三偈集唯長老蘇那拘利毘沙一人有通力偈頌又有十三首一四偈集六四五我由在家身由出家以來無起卑過思而我不自知六四六屠打諸生類使之受痛苦如此長時間我不起是思六四七無量慈心善知修練準佛之教次第積集六四八大眾皆為友哀愍諸生類常樂不瞋恚修練慈愛心六四九我心喜悅不動不搖我心為善修習梵行六五以達無尋正等覺者之弟子直達聖沉默六五一恰如巖山聳立不動如是比丘盡愚癡故如山不動六五二無執著者常求清淨毫末邪惡見虛空大六五三邊地有都城內外善防護等同防護己瞬時勿空過六五四六五五我不欣死六六六七六五六六五七奉事我師六四六五六五八成道依精勤此為我教誡今我入圓寂隨處得解脫右離曰長老六五九良種之善牛繫荷堪挽荷過度受重壓而生不離軛六六等智飽滿者猶如海之水勿輕侮他人此生類尊法六六一及時能降伏於生有之有輪迴苦受人青年之憂苦六六二依樂法上依苦法下愚者不識為兩者惱六六三苦惱之上快樂之上中道之上超越欲念彼等住立恰如門柱不受煽壓六六四有所得與無所得一切名譽與盛聞一切責難與稱讚一切苦痛與安樂六六五彼等一切無染著猶如水滴蓮葉上勇者安樂一切處於一切處無敗亡六六六依法而不得不法而利得合法不得者勝於不法利六六七覺少者譽高有智者無譽有智無譽者勝於譽高者六六八智鈍被稱歎智人受誹謗受謗之智者勝於愚鈍者六六九由欲得安樂遠離生苦惱遠離生苦惱勝過欲安樂六七依非法而生由非法而死合法而死者勝非法之生六七一捨欲貪忿怒輪迴中生存心歸寂靜者行道無執著彼等無漏愛而亦無非愛六七二修習七覺支五根與五力達最上寂止入無漏涅槃右伍達陀長老攝頌離曰伍達陀此等二人十四偈集而長老有大神通力偈頌二十八首一六偈集六七三聞有妙味法我益以增信聞法離貪欲不著一切處六七四此一世界於地輪上多相貪欲攪清淨思六七五猶風揚塵以雨鎮壓等智見時思惟息止六七六諸行無常以是智見人嫌厭苦為清淨道六七七諸行是苦六七八諸法無我如是智見人嫌厭苦為清淨道六七九長老憍陳如出離之念銳捨離生死路開悟成梵行六八索與瀑流強杙碎難山杙與索斷破此難破岩禪思渡彼岸脫除魔縛纏六八一虛浮且動轉比丘近惡友彼為波浪倒沉入大海中六八二不動無虛浮慎重攝諸根智者有善友應盡苦惱際六八三六八四四肢如迦羅之結節二四三二四四六八五六八六我不欣死六六六七六八七奉事我師六四六八八我為此利益出家已得度我為成利益群棲有效果右阿若憍陳如長老六八九住定調柔己動作如梵天以悅寂靜心是為等覺者六九此人達一切諸法之彼岸如是禮拜佛我聞阿羅漢六九一超越諸結縛由林來非林樂由諸欲脫如脫黃金礦六九二彼那伽於雪林中快樂極無比諸多那伽名真與此名應彼為最上者六九三為汝說那伽彼不犯過惡慈愛不害生那伽具兩足六九四正念與正知那伽他兩足那伽信心手平靜有白牙六九五正念為其首智慧是其頭思惟是法思和住是法腹遠離是其尾六九六禪思樂入息內心善住定那伽行住定那伽立住定六九七那伽臥住定坐亦住於定防護一切時那伽有成就六九八彼受無過不受有過以得衣食排斥蓄積六九九斷粗細結斷一切縛隨處而行無所期望七可愛白蓮水中而生花有淨香不為水污七一等同於佛出世住世不為世污如同赤蓮七二點大火聚不與薪木即歸消滅雖有餘燼稱謂既消七三此一義理譬喻啟示識者說明那伽說明諸大那伽是為知識七四離貪離瞋離癡無漏那伽捨身無漏圓寂右優陀夷長老攝頌憍陳如與優陀夷此二人於十六偈集乃有大神通力之長老偈頌共為三十二二十偈集七五賊首曰或為供犧牲或為得財貨我等曾害者一切皆怖畏此等諸生類震悚且悲哀七六汝無怖畏狀顏色益和悅如此大怖畏汝何不憂懼七七長老曰首領我無期望者心中無苦悶斷盡諸結縛超越諸怖畏七八盡生有導因如實見法故對死無恐怖恰如卸重擔七九善修梵行善修佛道無死恐怖恰如病癒七一善修梵行善修佛道生有無味如捨嚥毒七一一度生死彼岸務終無取著命盡而滿足恰如免殺戮七一二達最上法性無世間諸欲由火宅脫出無死之憂苦七一三凡為集合物又得生有者無有超世主大仙如是說七一四依佛所說知如是者不執生有鐵丸熾熱七一五我不思云有亦不思云無諸行將滅盡此處何憂懼七一六首領淨法生起正行相關如實見者無有怖畏七一七草薪等世間以智慧見時無有彼我念我無有此故即無憂苦惱七一八我嫌厭我身無生有欲望如此身破壞無再有他身七一九汝等以身有作為依據所望而為此對我以此之所緣我無瞋恚無情愛七二彼聞此語以為希有身毛豎立拋棄刀劍諸青年等作如下言七二一大德汝何為何人是汝師汝依何人教得此無憂性七二二一切智者一切見勝者乃為我師範一切世間之醫者大悲愍者是我師七二三滅盡無上法依彼為說示我依彼之教我得無憂性七二四盜賊聞仙士善說及善語捨劍捨兇器或者離其業或者樂出家七二五此等識者聞善逝教出家得度歡喜滿足修習七支修習五力寂滅無為達涅槃道右阿提目多長老七二六婆羅波利耶沙門一比丘獨坐禪思時有如下思起七二七應依何次第動作與禁行完成己義務無害於他人七二八人間有諸根利益不利益不護不利益護持為利益七二九護持諸根防制諸根完成義務無害他人七三若走諸形色不制御眼根不見形色患不得脫苦惱七三一若走諸音聲不制御耳根不聞音聲患不得脫苦惱七三二未見出離者若嗅諸香氣香氣迷惑彼不得脫苦惱七三三最上酸甘味記憶諸辛味執著味欲者心不得覺醒七三四美好受快感記憶諸般觸染著貪欲根得受種種苦七三五依此諸種法不能防止心總由五根起苦惱追隨彼七三六數多之死屍膿血充滿身由劃師之手彩色美如藍七三七辛甘味之苦不覺愛繫縛恰如刀塗蜜不覺被割刺七三八女貌女之味女香女之觸對此起染著得受熱惱苦七三九婦女之孔穴總共有五處五處滲汁液精進得防止七四彼為利益人亦為法住者巧妙明辨人樂務法義故七四一明辨不放逸應來之沉沒無利益之業斥之不為務七四二有益相結合依法得喜樂執於此行者最上之喜樂七四三以種種方便希望克制他打殺更憂苦暴力侵他人七四四有力人割物如以橛拔橛巧慧制諸根即以根制根七四五信進念定慧沙門勤修習五力打五欲婆羅門無苦七四六利益法住者為行佛言教精進無餘所此人加安樂右婆羅波利耶長老七四七長時熱烈法思念我問沙門婆羅門而心不能得安靜七四八此世誰能達彼岸誰得霑潤甘露法何人通法最上義我將對其為領受七四九食餌之魚愚且癡懸入釣鉤不得脫如被因陀羅網縛毘摩質多阿修羅七五我於此世被牽引我無由脫離憂苦誰能為我解纏縛教示我修等覺道七五一沙門婆羅門指示我斷絕依何除老死我誠心領受七五二疑惑猶豫絡以結議論力忿怒心剛愎而貪求諸欲七五三放渴愛之弓結三十之見身見邪見凡所立之物破此見己力七五四不捨其他諸邪見思惟追憶心益熾我今為此衝動轉恰似風搖樹之葉七五五我有之一念內心起疾熟身為六觸處我有常發出七五六疑惑箭未拔亦未用刀割良醫用探針我尚未得見七五七誰能不用刀拔我內心箭不害我四肢使箭得拔除七五八法主最尊者排除毒與過我陷於深淵指示我明路七五九我今陷入沼澤中塵埃之側秘難除虛偽嫉妒起議論惛沈隨眠蔓延中七六貪欲思惟之車乘調戲之雷結縛雲以運載橫邪之見七六一流四方流蔓芽生存誰防此流誰斷此蔓七六二大德防流築堤防生流由汝心防心如不用暴力以擊樹七六三如是起恐怖此岸索彼岸我無依止處願侍仙士群願以智慧師以為我武器七六四對此水之流構築使清淨造以法之精強與以階梯以時告示我汝心勿恐怖七六五念處之樓閣我為率先登身見思愛樂我作正觀察七六六我見登船道自己無住著最上之埠頭我已遙望見七六七依生有之因而生箭已出為遮此等故以說最上道七六八佛為除過毒常時隨我側常夜為定著為我拂結節右提羅迦尼長老七六九飾相瘡腫塊抱病多思惟見此積集身住立不確固七七摩尼珠耳環以為頭面飾骨皮組色身衣服為美觀七七一足塗以蟲脂面飾以香粉愚人為愚迷不得求彼岸七七二髮組為八辮眼塗安膳那黑藥膏愚人為愚迷不能求彼岸七七三裝飾腐臭身飾安繕那壺愚人為愚迷不能求彼岸七七四獵夫設羂網鹿不為其繫鹿食餌盡去獵夫空悲泣鹿謂我等去七七五獵夫羂網破鹿不為其繫鹿食餌盡去獵夫空憂悲鹿謂我等去七七六於此世間見有財人愚而得財不作施捨慳貪之人積蓄財物貪求諸欲日益加甚七七七王用暴力征服地上至海之濱併吞全地海之此方猶不滿足海之彼方亦欲求得七七八王者與他諸人人至死未能離渴愛未到十分即捨身此世諸欲未能滿七七九親族之人髮紛亂此悲泣又願我等皆不死包以衣服外運去火葬場地附荼毘七八彼以串刺捨富財單一衣身被燒毀親族朋友及同士從此均已無依怙七八一持彼財去嗣續者人依其業而隨赴死者不能隨財去兒妻財國不隨行七八二依財不能得長壽依富不能使不老賢者稱歎此壽命少量無常變壞法七八三貧富共死觸賢愚亦皆同愚者愚打臥賢者死無恐七八四智者勝於財此世達終末愚者未達終生生犯邪業七八五人入輪迴次第入胎入他世界信心少智轉生入胎入他世界七八六恰如盜賊現行被捕邪法之徒依業被打邪法群眾輪轉來生入他世界為業被打七八七諸欲愛美甘形色擾亂心大王見此我出家真勝沙門道七八九信心我出家入於勝者教出家我無失受食不負債七九諸欲如熾火如刃遇黃金下胎來是苦地獄見大苦七九一我見此患難彼時我震驚彼時我受教諸漏達滅盡七九二奉事我師六四七九三為我利益由家而出家六五斷盡諸結縛右賴吒和羅長老七九四見色思愛相正念且消失心有染著者感受且愛執七九五緣色生受貪增長種種害其心逢苦惱積苦遠涅槃七九六七九七聞聲思愛相七九四由聲生種種七九五七九八七九九嗅香思愛相緣香生受貪八八一喫味思愛相緣味生受貪八二八三觸觸思愛相緣觸生受貪八四八五知法思愛相緣法生受貪八六彼對諸色無染著見色不失彼正念離染之心感受色具對諸色無愛執八七見色有感受彼若如此者苦聚不減少正念以遊方無苦近涅槃八八彼對諸聲無染著聞聲不失彼正念離染之心感受聲見對此等無愛執八九聞聲有感受彼若如此者苦聚不減少正念以遊方無苦近涅槃八一八一一彼對諸香無染著嗅香八一二八一三彼對諸味無染著喫味八一四八一五彼對諸觸無染著觸於觸八一六八一七彼對諸法無染著以知法右摩倫拘耶弗陀鬘童子長老八一八世羅婆羅門曰圓滿之身善美善生可愛世尊汝身金色汝之白齒有大力用八一九善生之人諸多相好大人形相總在汝身八二清明之眼端嚴之顏沙門園中太陽放光八二一汝顏貌美好皮膚似黃金比丘斯優色沙門何利益八二二汝應為輪王諸王中之王四方征服者適作閻浮君八二三汝為剎利種亦為富財王願為汝附隨瞿曇王中之王人間之王願汝領王事八二四世尊言曰世羅我是王者也無上之法王依法轉法輪任人不退轉八二五世羅婆羅門曰汝瞿曇汝等覺者無上法王以法轉輪八二六誰為尊軍帥師之嗣弟子誰能善倣效轉此大法輪八二七世尊言曰世羅我所轉之輪無上之法輪如來隨生者舍利弗傚轉八二八應識知者為識知應修習者為修習應捨棄者我捨棄婆羅門如是行法我為佛八二九對我除疑惑汝宜有信心婆羅門汝見正等覺常常宜感謝八三此世所現事常當存感謝婆羅門我為此覺者無上之醫者八三一至高無比伏魔軍者克一切敵樂無所懼八三二世羅曰諸友聞具眼者語彼為大醫師亦為大雄者如林獅子吼八三三至高無比者克服眾魔軍無誰不信仰縱令黑族生八三四願伴我者伴不願伴者去我於勝者側此處我出家八三五師尊正等覺者教如喜悅師尊於勝智者側我等亦出家八三六三百婆羅門合掌齊發願世尊我等於汝側共同修梵行八三七世尊言曰世羅即時現生果梵行能善說精勤修學人出家非徒然八三八具眼者世尊今先第八日歸依汝之前我等七夜間得汝教調御八三九汝佛汝師汝克魔羅牟尼仁者汝破愛著度生死流更渡群生八四汝生超素質離慾盡諸漏汝心無取著無畏如獅子八四一三百比丘合掌站立雄尊伸足龍象欲禮右世羅長老八四二我坐於象首敷以柔被衣我食沙利飯食上撒淨肉八四三今日善運有善根殘食入鉢心喜樂喬達之子跋提耶心無取著靜禪思八四四塵衣受用有善根殘食入鉢心喜樂喬達之子跋提耶心無取著靜禪思八四五八六一常乞食者有善根乃至但持三衣者善根乃至次第乞食者善根乃至但一座食者善根乃至鉢乞食者善根乃至不重受食者善根乃至阿練若住者善根乃至樹下住者善根乃至露地住者善根乃至塚間住者善根乃至隨處住者善根乃至常靜坐者善根乃至心少欲者善根乃至能知足者善根乃至遠離諸欲者善根乃至非交遊者善根乃至善精勤者善根乃至八六二黃金蟲脂鉢價貴鉢捨棄我取土製鉢為第二灌頂八六三高圓城壁中堅固有望樓執劍人守護住者猶恐懼八六四我今無恐懼己捨恐怖畏喬達子提耶禪思入森林八六五住立戒蘊上修習念與慧次第斷結縛終達滅盡地右迦利喬達之子跋提耶長老八六六鴦掘魔曰沙門汝行而云我立住又我立住而云非立住沙門我問此義為如何何以汝立我不立八六七佛曰鴦掘魔我對諸生類而立捨害意汝對諸生類生害不自制依此因緣果我立汝不立八六八鴦掘魔言久矣大仙我崇拜沙門汝入大林來願聞正教汝之偈千萬罪惡我捨棄八六九如是盜賊刀武具投入崖穴奈落中盜賊頂禮善逝足其處歸佛願出家八七大仙佛悲愍人天兩界師爾時向彼言善來比丘彼乃作沙門八七一人先放逸後不放逸如離雲月光照此世八七二人作惡業為善所覆如脫雲月光照此世八七三少齡比丘勤佛之教如脫雲月光照此世八七四我敵聽法談我敵勤佛教我敵領納法與善靜人友八七五我敵談忍辱我敵讚和合時時聽聞教且順此實行八七六如是敵必定他我均無害寂靜達最勝護持強弱者八七七渠工導水箭工矯箭木工曲材賢人調己八七八或以杖責打鉤鞭來矯正我不用刃杖善教歸調柔八七九我先有意念為害他人者我名稱不害今得真實名不害任何人八八我先為盜賊皆知鴦掘魔今為大水流歸佛為弟子八八一我先血染手被稱鴦掘魔我今見歸依滅卻生有因八八二如斯多造業臨終導苦趣不與業果觸受食不負債八八三愚而智劣輩耽著於放逸智者不放逸最勝如珍寶八八四勿耽怠惰勿耽欲樂精勤禪思最上安樂八八五分別諸法中我達最勝者至善不至惡不為邪度量八八六我達及三明成就佛之教至善不至惡不為邪度量八八七林中樹下山間窟中爾時心悸處處慎立八八八立臥皆安樂我營樂生活不懸魔羅羂我蒙師慈愍八八九父母兩系高婆羅門族生我今師事佛善逝法王子八九離愛無取著守護六根門善能為自制斷邪惡根本我已達漏盡八九一我奉侍師成就佛教我卸重擔滅生有因右鴦掘魔長老八九二捨離父母與兄弟捨離姊妹與親族更能捨離五種欲阿㝹樓陀靜禪思八九三舞蹈伴歌唱鐃鉢連響醒魔羅世界樂我不獲清淨八九四今我得超越樂於佛之教度一切瀑流我得靜禪思八九五色聲香味觸此等亦超越彼阿樓陀獨自靜禪思八九六牟尼托鉢終無漏㝹樓陀無有第二人單獨探塵衣八九七牟尼取塵衣洗染自披著有慧無漏者是阿㝹樓陀八九八大欲不知足輕燥好交際邪惡有染污此為人之法八九九正念與少欲知足心無惑以閑居為樂智慧常精勤九菩提支分法此等為善良彼可成無漏大仙如是宣九一知我所思惟世間無上師以心所造身神通近我前九二較我所思惟說示更上者樂解戲論佛說示非戲論九三我知其法樂住於教通達三明成就佛教九四五十五年間自制常不臥二十五年間自制泯懶惰九五如是心安立無有出入息無欲具眼者寂靜歸圓寂九六彼以端直心降伏一切受內心得解脫如同燈火滅九七今以觸為六牟尼最後身等覺入滅後他法不再生九八今日於天界住居無欺瞞斷生死輪迴今無有再生九九比丘猶如梵天王一瞬時間見世間千萬諸種神通力得見人天生死機彼已為天子九一安那波羅我昔名貧為食物運搬者譽高沙門優婆利吒我曾對彼為供養九一一我之出生釋迦族阿樓陀世所知舞蹈歌唱人所侍鐃鉢之音我覺醒九一二見等覺者奉無畏師我起信心出家得度九一三往昔我住所我已知宿住帝釋天中生三十三天立九一四七度為人主領理諸國事四方勝利者閻浮洲之君不用刀與杖以法訓誡民九一五由此七輪迴由此七輪迴乃至十四迴輪爾時天上立我得善知識九一六於五分定修習寂靜我獲輕安得淨天眼九一七群生之生死我知其去來五分之定立知其是不是九一八我奉事佛成就佛教我卸重擔滅生有因九一九於跋耆族之愛魯婆命盡其下竹林中無漏我入滅右阿㝹樓陀長老九二花放大林中閑居心一境波羅波利耶沙門坐禪思以下為其所思語九二一世尊人中最上者彼在世時比丘威儀無有異如今已異矣九二二此處彼處無不滿足防止寒風遮蔽恥處以受適度量九二三美味不美味少量或多量不貪亦不惑唯在繫生命九二四汝漏已盡耶生活之要具藥物他物品對之無強欲九二五林中與樹下住於岩窟間增長幽靜情以此為目的九二六謙遜節儉且溫柔心不剛愎且優美不饒舌專心利思九二七依此行食所可愛受用所威儀宛然如滑潤之油間九二八一切漏盡大禪定家大慈利者如斯長老今入涅槃如是今少九二九善法與智慧由於漸消失一切善勝方具備勝者教於是漸滅亡九三邪法塵勞之世欲遠離者持正法之餘九三一此等塵勞增入於眾人中撥弄愚人事猶見惡羅剎之愚弄狂人九三二彼等為塵勞彼此為所敗自諍或眾諍奔馳塵勞上九三三彼等捨正法彼此互相諍彼等隨邪見此為最上思九三四捨棄妻兒財等等離家人一匙量乞食不為其過行九三五食至滿腹背向下臥醒來談話師之所禁九三六學習技工術內心不安靜云求沙門道此有沙門性九三七土油洗粉水牀座與飲食在家人奉養然則多量求九三八楊枝迦捭多果花草可食物豐富一摶食菴羅阿摩勒九三九藥物之上如醫者應為不為如俗人裝飾美好如遊女權威猶如剎帝利九四彼等多有二心者詐欺者偽證者瞞著他人用手段多以手段受財施九四一適合計略行手段奔走意向為生活謀取生活用方便諸多財物得招來九四二諸多起集會為業不為法說法為他人為利不為義九四三更於教團外教團爭利得受用他所得無慚亦無愧九四四或剃頭以纏著僧伽梨衣如是常耽著放心為名利唯求於名譽九四五當種種事已去今欲如昔為不易未抵達處難抵達已抵達處難守護九四六正念使現前猶如無履行於荊棘之地牟尼是履行九四七思及往昔之行者憶念彼等之梵行假令今日為最後無滅之道須接觸九四八於沙羅樹林世尊為此語修練諸根者沙門婆羅門仙士斷再生涅槃歸圓寂右婆羅波利耶長老攝頌二十偈集阿提目多婆羅波利耶提羅迦尼賴吒和羅鬘童子世羅跋提耶天眼鴦掘魔阿㝹樓陀師婆羅波利耶十長老有名聞偈頌共總數二百有四十五首三十偈集九四九善自攝制修練心見多可愛比丘眾蔓多羅沙姓仙人彼向弗沙比丘問九五欲望未來人如何意志者如何為舉動我問汝語我九五一蔓多羅沙仙我言汝諦聽汝應多思念為汝語未來九五二未來忿又恨己為惡所覆剛愎詐偽心且有嫉妒心意見與人異九五三深海濱往來思欲識知法輕法不尊重互相不恭敬九五四彼於未來世將起多患難此等劣智輩污蔑善說法九五五際此集會時縱令德卑鄙無懼且多言不學佔優勢九五六際此集會時縱令具有德陳述隨正義且有慚恥心而無欲念者劣勢不欲爭九五七未來劣智輩酷愛金與銀山田與宅舍牛羊與奴婢九五八愚癡且易怒戒心不安定橫行如獸類虛誇樂鬥爭九五九舉動多輕噪身纏青色衣懷有詐欺心頑固且巧辯巧妙行交際闊步如貴人九六滑髮以香油眼塗安繕那身著牙色衣輕噪行街路九六一善色阿羅漢幢旗破舊解脫人不嫌然喜戀著白衣者彼等厭棄此黃衣九六二心中望利得怠惰乏精進厭住邊林間喜住村落中九六三常樂邪生活從得利益者無有自制心倣傚他人行九六四不得利益者不受人恭敬縱令為賢者無利人不隨九六五賤己之幢旗染用蠻民紅外道之白幢反而為守護九六六彼等對袈裟不予行尊敬比丘對黃衣亦不加省慮九六七不能勝苦者如矢貫其胸痛惱之狂象心起大恐怖九六八爾時六牙之白象見此應供深紅幢說此意味深長偈九六九人無煩惱者應著黃色衣虛語不調御不應著黃衣九七既已捨煩惱於戒善安立調御有實語彼應著黃衣九七一破戒劣智且邪曲放縱諸欲心散亂缺乏奮勵不精進是人不應著黃衣九七二具戒離貪欲寂靜住安定心思惟潔白彼應適黃衣九七三輕噪且浮誇愚而無戒者彼應適白衣奈何著黃衣九七四比丘比丘尼彼等心污穢無有恭敬念抑壓慈心人九七五長老教愚者如何持衣服劣智邪曲輩縱欲彼不從九七六如是受教諸愚者彼等互相不尊敬恰如駻馬對馭者對於師言不介意九七七等到未來世最後時至時比丘比丘尼行蹤不如是九七八未來大恐怖之將來到前彼此相恭敬溫柔且友誼九七九慈心有悲愍於戒善攝持熱烈行精進常應堅奮迅九八放逸應恐怖精勤得安穩修習聖八支必達甘露道右弗沙長老九八一不失正念隨力行依思惟行不放逸心善住定獨滿足以此乃是云比丘九八二食汁又食乾而亦不甚飽腹不滿有節量有正念比丘請遊行九八三四五口之飯不吃只飲水專心之比丘滿足住安樂九八四得求於此教適度受衣服專心之比丘滿足住安樂九八五盤膝坐跏趺天空無雨降專心之比丘滿足住安樂九八六以樂見苦以苦為箭不住中間誰奈我何九八七我無邪欲亦無怠惰精進不乏不寡見聞如無不遜誰奈我何九八八博聞而且有智慧於諸戒法善住定心念止息更專一於我頭上立三學九八九專喜戲論行如獸類彼無安穩不得涅槃九九捨棄戲論樂行正道彼得涅槃無上安穩九九一村里或森林窪地或陸地阿羅漢住止彼地為樂處九九二森林為可樂凡夫不樂此離貪欲者樂彼等無諸欲九九三智者責己過賢者見己失如人告寶所事此無是非九九四誡之與教之遠離不善者雖被惡人憎但受善人愛九九五具眼佛世尊為無智說法我等抱欲心對法不依耳九九六九九七聞法不徒勞我已得解脫以身住無漏宿住天眼通心差別神通以及死生通耳界清淨通我已無誓願九九八剃鬚纏僧衣慧第一長老是優波帝須樹下坐禪思九九九具有無尋覺者弟子彼為最尊以獲寂默一恰如巖山聳立不動如此比丘滅盡愚癡泰然如山一一對物不執著心常求清淨邪業毫末量見如虛空大一二我不歡喜死我不歡喜生有正知正念而放棄此身一三我不歡喜死我不歡喜生如僕待終務而靜待時至一四此死共兩處先後無不死善修勿使失瞬時勿空過一五邊地有都城內外嚴防護等同防自心瞬時勿空過瞬時空過者故墮泥犁憂一六寂靜歸止息言語勿輕噪拂去邪惡法如風掃樹葉一七寂靜歸止息言語勿輕噪拔除邪惡法如風掃樹葉一八寂靜去執著清澄無污濁善戒有智慧除盡諸苦惱一九在家或出家不可盡信賴先良成不良不良成善良一一貪欲與瞋恚惛沈之睡眠掉舉與疑惑此等五煩惱污濁比丘心一一一比丘住精勤受他之恭敬如逢他不敬等同不動定一一二堪忍禪思見觀微細喜滅取蘊彼稱善人一一三大海與大地有山又有火師之勝解脫此等不足喻一一四傚佛轉法輪大智有安定如同地水火無染亦無污一一五智慧波羅蜜大智大牟尼不愚如愚者清涼常遊行一一六我奉事師佛乃至一一七精勤成道為我教誡今我圓寂隨處解脫右舍利弗長老一一八識者不友兩舌人瞋怒慳貪喜破滅合會惡人為禍根一一九識者應交信心人如愛智慧博聞人合會善人有幸福一二飾相瘡腫塊抱病多思惟乃至一二一多聞巧演說為佛之侍者瞿曇卸重擔離結設臥處一二二漏盡離結超著清涼到生死岸持最後身一二三日種親族住止佛法瞿曇所立到涅槃路一二四由佛得法門八萬有二千由比丘所得亦有二千數八萬四千門我等須護持一二五寡聞之男如同老牛彼之肉麤智慧不加一二六博聞之人以所聞而輕視寡聞之人恰如盲者攜燈火我等如是了解之一二七敬事博聞人勿喪所聞處此為梵行根為法護持者一二八聞一部知始終知義理通詞句學正法探義理一二九堪忍願樂生努力測正法內心安善定隨時起奮勇一三博聞護持法識法有智慧如是佛弟子儘人所當事一三一博聞持法者守護佛寶藏世人須尊敬為眾之眼目一三二法為遊處樂法思法念法比丘不退正法一三三身之勞苦慳貪甚命時時衰不奮起貪著肉身安樂者沙門之樂何處來一三四諸方對我不分明我於諸法不了解良友由此世間去宛然我入黑闇窟一三五良友亡失師過去者身念如是己無良友一三六古者已由此世去新者與我不相合今日獨自我禪思猶如雨時巢籠鳥一三七眾多之人諸國來為聞佛法欲見我聞法之事不可遮此知我之時已到一三八眾多之人諸國來欲見尊師請許可師為佛法具眼者我等聞法不可遮一三九二十五年間我為有學者不起愛欲想見法之善性一四二十五年間我為有學者不起瞋恚想見法之善性一四一一四三二十五年間我以慈身業我以慈語業我以慈意業隨侍奉世尊如影不離形一四四佛之經行隨後行之佛之說法我生智慧一四五我所作未辦有學心未熟慈愍我等師不幸逢圓寂一四六勝人正覺者一旦歸圓寂爾時有恐怖身毛皆豎立一四七多聞持法者護持佛寶藏世間之眼目阿難尊圓寂一四八多聞持法者乃至暗中拂黑闇之人一四九行處有正念堅固之賢士正法支持者長老寶之源一五我奉事師乃至右阿難長老攝頌弗沙優婆帝須舍利弗阿難三長老有名聞此處偈頌百零五四十偈集一五一長者群集勿遊行如是心亂難得定得見眾人集之苦長者切勿喜群集一五二牟尼汝勿入俗家如是心亂難得定元氣盛而貪諸味捨棄安樂之福利一五三俗家禮拜與供養此為淤泥應須知微細之箭此難拔惡人恭敬此難擯一五四山間棲處下乞食入都城我見癩人食恭敬我近前一五五彼手持腐果向我薦其食投食我鉢中彼指亦壞落一五六我憑垣根處而我食其食由始食至終我心無厭嫌一五七依戶而食牛溲為藥樹下座臥衣糞掃衣受此等物為四方人一五八佛之嗣續者山上捨命處迦葉有正知正念有神通毅然上行去一五九迦葉乞食歸毅然登山上無著無怖畏獨坐靜禪思一六迦葉乞食歸毅然登山上無著於燒中清涼靜禪思一六一迦葉乞食歸毅然登山上無著所為終無漏靜禪思一六二蔓草加麗利掩地域象聲所響處此等岩山內為我安樂所一六三碧雲色美麗清冷水澄湛地為因達伍波迦甲蟲掩吾樂此岩山一六四碧雲峯優美宛如棲閣頂象聲所響處吾樂此岩山一六五山地雨降注可樂有高台諸仙往來處冠鳥孔雀聲繁喧此等岩山內為我安樂所一六六專心凝靜處我以此為足比丘修清福我以此為足一六七轉心求安樂我以此為足專心求觀行我以此為足一六八鳥麻花衣著如雲覆虛空種種鳥類群此等岩山內為我安樂所一六九此處在家者不集獸群所悠遊種種鳥群集此等岩山內為我安樂所一七有澄水一一三六一一七一如奏五種樂集於心一境得見正法人喜樂實無比一七二勿作多業四九四一七三勿作多業遠離非利困疲苦惱不得安息一七四只為唇動無見無知硬直徘徊自思為優一七五愚者身劣思己為優強頑之心人不稱揚一七六我優我不優我劣我不劣智者於等同憍慢中不動一七七智慧語真實戒律得安定心達安息者智者所稱揚一七八同為修梵行而不受尊敬正法於遠離如同地與空一七九增長梵行常存正念常有懺愧再生斷盡一八比丘輕噪心不定假今身纏糞掃衣彼以此為無上美猶如猿猴纏獅皮一八一心定不輕噪慎重攝諸根以著糞掃衣美如山窟獅一八二此等諸天子皆有神通力聞名有十千總屬梵天身一八三賢而大祥慮善定法將軍舍利弗尊者彼等合掌禮一八四人間善生者我今歸命汝人間最上者我今歸命汝汝之靜禪思不知何所依一八五諸佛各各有行處實為深遠不思量假令集合取髮者彼等亦難知於此一八六後見有德者尊者舍利弗諸天子恭敬劫賓那露笑一八七盡佛剎田除大世尊頭陀之德優無等者一八八奉事我師六四一八九不染飲食衣服臥塌瞿曇世尊不可測量猶如蓮華不為水污傾意出進離脫三界一九彼大牟尼念住為頸信仰為手智慧為頭常得寂滅遊行四方右摩訶迦葉長老攝頌四十為偈集稱摩訶迦葉長老唯一人偈頌四十二五十偈集一九一我觀生無常獨住山窟中唯獨無二人何時將有此我此何時來一九二我纏牟尼衣無意無欲念貪瞋癡己盡安樂住山腹何時將有此我此何時來一九三無常死病所老死之所惱觀身無怖畏獨住於林間何時將有此此將何時來一九四智慧造銳刀怖畏齎苦惱渴愛蔓附生切斷應須住何時將有此此將何時來一九五我以智慧造火熾諸仙劍獅子座上舞魔王軍勢敗何時將有此此將何時來一九六我集善良士交往重法人如實觀諸法勤勉勝諸根何時將有此此將何時來一九七我入山廓中時時念聖道疎離飢渴患風熱蟲蛇惱何時將有此此將何時來一九八大仙己知得難見四種諦以此安定己正念勿喪失達此以智慧何時將有此此將何時來一九九無量之色聲香味可觸法熱氣我有止智慧以見此何時將有此此將何時來一一談以麤惡語此原不為惑又復被稱讚此原不踴躍何時將有此此將何時來一一一草木蔓諸蘊此等無量法內外共稱量何時將有此此將何時來一一二著衣森林中我踏仙士路雨季飛新雲降注之雨水何時將有此此將何時來一一三冠鳥於孔雀森林聞鳴山窟中於是我起立思達不滅道何時將有此此將何時來一一四雨注入龍淵復向鯨海入可怖恒伽河閻牟那河中薩羅娑縛底將以神通力渡河不沈沒何時將有此此將何時來一一五如象徘戰場欲以斷諸欲心靜繫禪思清淨斥諸相何時將有此此將何時來一一六如為負債窘為富者所惱如貧者獲寶通大仙之教如貧喜獲寶何時將有此此將何時來一一七汝云在家生活不可要是汝誘勸我出家已多年我今歡出家何故對我不注意一一八心汝非誘我者耶汝云山廓種種羽翼鳥雷電轟轟起應響此等森林入樂樂一一九在家可愛親朋族於世嬉戲樂諸欲今總捨棄達涅槃心然汝對我不滿足一一一此為為我非為他武裝時至何悲傷總觀一切動轉物求不滅道我出家一一一一兩足優者善語者調御丈夫大力者心中動轉似猿猴不離貪欲實難制一一一二欲為種種甘與樂無智凡夫為此縛為求再生甘願苦為心所導投地獄一一一三孔雀蒼鷹聲頻繁虎豹圍繞森林中身捨欲望勿樂著心汝先如是勸說我一一一四四禪五根與五力修習七支與三昧於佛之教達三明心汝先如是勸說我一一一五到達不滅成救濟斷盡一切諸苦惱淨除煩惱修八支心一一一六五蘊為苦須正見由苦出者應捨棄斷盡諸苦於此處心一一一七正觀苦是無恆常乃至無我空正觀心止邪惡及殺害心一一一八圓頂毀形不雅觀手持唯有之一鉢諸家之間行乞食大仙之教委此身心一一一九往來街路善攝己家者欲者愛無念猶如滿月光明夜心一一二森林住者乞食者塚間住者襤褸者坐不臥者樂頭陀心一一二一植樹願望為得果即如希望斬樹根心無常動轉勸說我對此實是不可喻一一二二遠行獨遊無形色我對汝語不信服諸欲苦辛大怖畏想望涅槃我遊行一一二三我出家非為不運非為無慚恥非為生活無顏面心我為對汝有信服一一二四少欲捨覆止息苦此為善人所稱歎心汝於彼時勸說我今汝先我返舊所一一二五渴愛無明愛非愛美色樂受適意欲既擯斥者我已擯不為彼再返回去一一二六心所有場合隨汝語多生之中無觸怒汝之知恩來內生汝為作苦久輪迴一一二七心汝使我為婆羅門為王仙士剎帝利及天子毘舍首陀一一二八依汝我為阿修羅依汝之本墮地獄有時轉入畜生道我為餓鬼亦因汝一一二九時作假面香具師汝勿再再誑騙我縱然我今捨棄汝我雖發誑不欺汝一一三心於曩七七一一三一此世無常不堅實亦無精質師示我心使我得入勝者教超大苦難渡瀑流一一三二心汝今不可如先在我今更不蒙汝制大仙之教我出家我今不再遭損失一一三三山海河大地十方總無常三有有患難心何處享安樂一一三四心醜陋更何為心我不受汝制我斷兩口鞴不觸九孔流一一三五野豬羚羊竊出沒天作巧妙窟舍中新雨降濺森林內心此處享樂入窟中一一三六青色之頸有善冠雜色之羽包尾翼空中飛行美妙聲使汝林中禪思樂一一三七四指草上美花放森林雨降似雲色我臥山中如樹木我之臥牀柔如綿一一三八我將為如自主人所得之物將滿足如同革工鞣貓皮柔皮為囊不懈怠一一三九我將為如自主人所得之物將滿足我今伏汝依精進如伏狂象巧象師一一四如調馬師之矯馬善調順汝得固定我以安泰防護心是人常得履行道一一四一縛汝緣境以強力縛象於柱以強繩我以正念能守汝修練不依諸生有一一四二遮止邪路以智慧努力制心入正路澈見苦之集起滅第一語者嗣續人一一四三心汝曾對我為指導於此四倒之世界今汝破結縛可離師大牟尼一一四四森林美飾心自在獸雲為鬘樂入山心山谷人稀汝為樂心汝將必定到彼岸一一四五無論男女制意望從而得享諸安樂心無智從魔受羅制汝喜生有為從屬右陀羅弗陀長老攝頌五十偈集獨清白陀羅弗陀一長老此處偈頌五十五六十偈集一一四六住森林乞食殘食入鉢樂內心善住定得破魔王軍一一四七住森林乞食殘食入鉢樂震動魔王軍如象震葦舍一一四八忍耐住樹下殘食入鉢樂內心善住定得破魔王軍一一四九忍耐住樹下殘食入鉢樂震動魔王軍如象震葦舍一一五醜哉組骸骨肉筋縫小舍充滿有惡臭他體思己有一一五一皮膚包糞袋妖魅有潰瘍汝身有九孔流出不淨液一一五二汝身所合污物縛九孔惡臭流濁液比丘應避此不淨猶如好潔人避糞一一五三若人如知此知此應遠避如雨期糞坑污穢滿外溢一一五四如是誠如是大雄士沙門誠如汝所云應知此淪落如泥中老牛一一五五薑黃諸顏料描繪此虛空自思為得意有害而無他一一五六等同虛空內我心善定住勿接汝邪心如鳥投火聚一一五七瘡腫塊飾相抱病多思惟見此積集身住立不確固一一五八見種種特質舍利弗涅槃爾時有恐怖身毛直豎立一一五九諸行無常乃至一一六五蘊己不見見為他物者如貫微細物以箭貫毫末一一六一諸行已不見見為他物者如穿微妙理以箭穿毫末一一六二二一六三如以刃刺三九四一一六四我修練己心持得最後身我以此足指動鹿母樓閣一一六五以解一切結志趣此涅槃柔情以小力終不可達到一一六六此青年比丘為一優勝人魔王為所敗持得最後身一一六七毘婆羅山槃荼婆岩窟繼續墜落雷然此無比佛之子山岩窟中靜禪思一一六八安靜歸寂滅邊地居牟尼佛尊嗣續者梵天為敬禮一一六九安靜歸寂滅邊地居牟尼佛尊嗣續者婆羅門敬禮迦葉尊一一七經生百世婆羅門人間之中知吠陀婆羅門身出生者再再生為婆羅門一一七一三吠陀之讀誦者此等不足度彼岸以比禮拜迦葉尊不及十六分一值一一七二先為朝饗順次逆次見八解脫然後受食一一七三婆羅門勿侵比丘勿侵自己苦行對阿羅漢心起信念合掌禮拜勿破汝頭一一七四為輪迴所累不見正法者奔馳非行處曲路與邪道一一七五塗糞如蛆蟲為諸行所惑專心為利養又求受恭敬比丘婆提羅一生空過去一一七六兩處得解脫內心住善定端嚴舍利弗我等見其來一一七七彼去渴愛箭三明結縛盡戰勝魔王者人間受供養無上之福田一一七八數多天子等神通有名稱總數有十千梵輔天之眾歸命目犍連合掌為禮去一一七九生善之人歸命汝最上之人歸命汝尊者汝身諸漏盡汝有應受供養德一一八人天所恭敬生而戰勝死白蓮水不污不被諸行污一一八一此一大比丘如同梵天王一瞬時間內見世一千方諸種神道力生死見時機彼為天之子一一八二智慧戒寂靜比丘達彼岸舍利弗最上一一八三百千俱胝生己身一剎那間為化成予熟神通變化巧一一八四目犍連為我之姓熟通定明以逮達圓滿無依著之教寂靜諸根有賢智破毀結縛無煩惱恰如象破腐蔓樹一一八五一一八六我奉事師六四六五同一一八七害佛弟子義睹羅及婆羅門迦屈山達杜西地獄之煮為如何一一八八一百之鐵杙各各使感苦佛弟子義睹羅婆羅門迦屈山達如是受害杜西之煮於地獄一一八九比丘佛弟子深知地獄苦如是害比丘魔王汝將難脫苦一一九大海之中部宮殿峙一劫瑠璃色喜樂光明如火焰此處種種色多數天女舞一一九一比丘佛弟子魔王汝將難脫苦一一九二依佛之所勸比丘眾期待彼以足指震動鹿母樓閣一一九三比丘佛弟子一一九四我以神通力我足指震動毘闍延哆樓閣天子震且驚一一九五比丘佛弟子一一九六毘闍延哆樓閣帝釋被問言汝以知渴愛滅盡解脫耶帝釋被彼問如實作解答一一九七比丘佛弟子一一九八善法樓閣中天眾之面前大梵天王主被問如是言我友汝先有之見今有同見否汝於梵界中過去見光輝一一九九大梵天王主如實作解答尊者我先有此見而今已不持一二我於梵界中過去見光輝今日謂我常住恒久知此是虛語一二一比丘佛弟子一二二解脫之喜樂見大彌樓山弗婆提洲林地上棲息人一二三比丘佛弟子一二四火燒愚人愚人不思愚人觸火為火所燒一二五魔王汝襲如來反燒自己猶如愚人觸火燒己一二六魔王汝襲如來積不善業波旬汝曾自思邪業不熟一二七魔者汝犯罪業長夜積集魔王由佛解縛對諸比丘勿起欲想一二八如是比丘麥薩迦羅於恐怖林叱坂魔王夜叉不喜湮沒其處如是尊者摩訶目犍連長老唱誦偈頌攝頌六十偈集唯一人大神通者目犍連偈頌共為七十八大集一二九我由在家出出家已得度魔起鹵莽想欲得隨逐我一二一修道我生善習術堅武裝一千大弓手四方使退散一二一一若比此數多婦女來此處我不為所惱住立於正法一二一二日種佛說法趣向涅槃道一度我聞法我心得喜樂一二一三我住如斯法波旬汝可近前來死王我將反制汝汝不見我道一二一四居家樂非樂一總皆拋棄何處無欲起比丘無欲者一二一五大地有形色人間天上界老朽總無常識者如是學而知以遊行一二一六人於本質上善起執著心見聞觸知處於此能欲念欲念皆除去此處無染污彼名為牟尼一二一七六十八邪見凡夫具思想住著非法上不屬何宗派而無邪執者彼可為比丘一二一八性格具圓滿長夜入定住無欲亦無偽牟尼有智慧深達寂靜道滅盡諸緣起靜待死至時一二一九瞿曇弟子捨憍慢捨棄憍慢無所餘汝等如為憍慢迷將來必定後悔久一二二群生如為覆所覆憍慢所賊墮地獄群生如為憍慢賊生入地獄長憂苦一二二一能履修道依道勝比丘絕欲無憂苦享受聲譽與安樂法見之人正稱呼一二二二然而於此世無有剛愎與憍慢捨棄障蓋成清淨除去憍慢無所餘安靜智慧盡苦際一二二三鵬耆舍曰我為貪欲燒我心被燃燒瞿曇垂慈愍教我消除法一二二四阿難曰依有顛倒想汝心被燃燒貪欲與俱有捨離清淨相一二二五定住一境性修練不淨相於汝有身念嫌厭之情多一二二六修練心無相拋捨愛與執憍慢汝知悉寂靜為遊行一二二七依人勿苦己說為如是語亦勿害他人善說如是語一二二八他喜聞語口出愛語不言他惡是為愛語一二二九真語不滅不朽之法寂滅之人住真法義一二三為達涅槃道為盡苦惱際佛說安穩語語中最上義一二三一深智之智者熟知道非道大智舍利弗說法為比丘一二三二廣語與略說聲如八哥鳥彼示無礙辯一二三三聞彼說法聲美音愛樂耳比丘心歡喜怡悅傾耳聽一二三四今日十五日五百比丘人為達清淨來諸仙斷結縛解苦盡再生一二三五猶如轉輪王諸大臣為伴大地至海際普徧皆巡行一二三六同具三明滅卻死魔諸弟子輩克無上戰奉侍師尊以為隊主一二三七總為世尊子此中非無實除去渴愛箭禮拜日族尊佛一二三八比丘逾千人奉侍善逝尊塵垢無畏法無畏說涅槃一二三九正等覺者說以聞廣大法比丘眾圍繞佛顏發光輝一二四世尊汝有龍之名諸仙中第七慈意如大雲法雨潤弟子一二四一日中由住起為見師尊行大雄尊弟子鵬耆舍前來禮尊足一二四二克魔之邪路遊行破障礙解除纏縛人分分以分別見無依著人一二四三為渡瀑流說不滅法見諸法者住立不動一二四四世之燈明人透視彼岸處彼於十法中證知最上法一二四五如是說善法知法者之中幾人不放逸然於世尊教精勤常禮拜一二四六憍陳如長老出離之志銳續佛開悟者常住安樂地以獲遠離人一二四七弟子行師教佛道可達成一總為精勤成就學習人一二四八三明大威力知他心所趣佛之嗣續者憍陳如禮拜師之足一二四九牟尼已盡苦惱際坐山中腹有三明滅盡死魔佛弟子禮拜以為師侍事一二五有大威力目犍連彼以己心得解脫彼以神通行測驗驗彼等心滅本質一二五一具備諸支分苦惱際涯盡具有諸方便師事瞿曇尊一二五二猶空無雲無垢穢如光輝圓月普照鴦耆羅娑大牟尼汝之名稱照世界一二五三我先醉詩歌村村都都行得見正覺者以達法彼岸一二五四彼岸之牟尼為我說正法我聞法和悅我即起信心一二五五我聞彼之語五蘊十二處徧知十八界出家而得度一二五六如來為利益此等數多之婦女男子而開示佛教而出現於世一二五七比丘比丘尼見物之規律為求彼等益牟尼證菩提一二五八日族有眼者佛尊愍眾生為說四聖諦一二五九四諦苦與苦生起苦超越與苦息止此為聖者八支道一二六此等如實說我如此等見我為達己利成就佛之教一二六一我來佛之側事出非徒然分別諸法中我通最尊者一二六二神通達彼岸耳界得清淨三明護神足知他心所趣一二六三現法斷疑尊智師聲譽清高世所知心歸寂靜一比丘死於阿伽羅婆廟一二六四彼名尼瞿陀劫波世尊與波羅門處世尊見賢固法求解脫禮拜世尊勤精進一二六五釋氏普眼者彼佛弟子總欲知我等以耳豫聽聞世尊汝為我等師世尊汝為無上士一二六六汝為我等斷疑惑此為汝對我等語饒智者圓寂比丘汝指示普眼者汝今指示與我等如對千眼帝釋天諸天之中為指示一二六七一切纏縛愚癡道無智之伴疑惑處此等若達如來者如來最上人眼目一二六八若人真能斷煩惱譬如風散浮雲層假如煩惱不能斷一切世界覆黑闇光輝人亦有煩惱一二六九賢人作光明我思汝為然我等為禪觀來謂汝之處於此眾座中劫波示我等一二七世間妙好人疾揚妙好音白鳥抬其首善調圓潤聲徐徐為歌唱我等傾意聞一二七一生死棄無殘邪惡一掃盡切望佛說法不果凡夫欲如來所慮者行事必有故一二七二全智者所為領受十全說最後我合掌我等知劫波彼不誑我等彼為尊智人一二七三覺聖者之語知其無漏所勿作欺誑語大精進之人猶如時暑熱惱人求冷水願得汝之語為聽者降雨一二七四劫波有法利精進修梵行對彼以為空彼己歸圓寂將入有餘滅抑或入解脫我等願聞此一二七五世尊曰此處名色上彼已斷渴愛五者最上之世尊曰長時無依著斷盡渴愛流無殘渡生死一二七六聞此世尊語我等心喜悅仙士中第七釋尊我等徒不問信汝婆羅門所言不欺我一二七七佛之諸弟子口言與身行虛偽之死王強網已被破一二七八世尊劫比耶見取著之源劫比耶已渡難超死王之領域一二七九兩足中尊者我向汝禮拜汝為天中天汝子已後出龍象之真子前來拜龍象尊者鵬耆舍長老唱如是偈攝頌曰七十為偈集明敏鵬耆舍長老唯一人偈頌七十一此等偈集諸偈頌一千三百六十首長老二百六十四漏盡弟子獅子吼如同火聚滅無餘
